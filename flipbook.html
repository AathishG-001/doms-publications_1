<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Reader — DoMS Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #8b1a1a; --accent2: #a02020;
      --toolbar-h: 52px; --bottom-h: 56px; --search-w: 300px;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: #2a2a2a; font-family: var(--sans); }
    body { display: flex; flex-direction: column; }

    /* ── TOOLBAR ── */
    .toolbar {
      height: var(--toolbar-h); background: #181818;
      display: flex; align-items: center; padding: 0 0.75rem;
      gap: 4px; flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .tb-back {
      display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.78rem;
      text-decoration: none; padding: 6px 10px 6px 0; border-right: 1px solid #2e2e2e;
      margin-right: 4px; white-space: nowrap; transition: color 0.15s; flex-shrink: 0;
    }
    .tb-back:hover { color: #fff; }
    .tb-title { color: #ccc; font-size: 0.82rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-sep { width: 1px; height: 22px; background: #2e2e2e; flex-shrink: 0; margin: 0 2px; }
    .tb-btn {
      background: none; border: none; color: #aaa; width: 32px; height: 32px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .tb-btn:hover:not(:disabled) { background: #2e2e2e; color: #fff; }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }
    .tb-btn.active { background: #333; color: #fff; }
    .tb-page { font-size: 0.73rem; color: #888; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .tb-download {
      display: flex; align-items: center; gap: 4px; background: var(--accent);
      color: #fff; border: none; border-radius: 4px; padding: 5px 10px;
      font-size: 0.72rem; font-family: var(--sans); cursor: pointer;
      transition: opacity 0.15s; flex-shrink: 0; text-decoration: none; white-space: nowrap;
    }
    .tb-download:hover { opacity: 0.85; }
    .tb-view-toggle {
      background: #2e2e2e; border: 1px solid #3a3a3a; color: #ccc;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      gap: 4px; padding: 0 8px; height: 28px; font-size: 0.7rem;
      font-family: var(--sans); white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .tb-view-toggle:hover:not(:disabled) { background: #3a3a3a; color: #fff; }
    .tb-view-toggle:disabled { opacity: 0.3; cursor: default; }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      .toolbar { display: none; }
      .mobile-topbar { display: flex !important; }
      .mobile-bottombar { display: flex !important; }
      .body-wrap { padding-bottom: var(--bottom-h); }
    }
    .mobile-topbar {
      display: none; height: var(--toolbar-h); background: #181818;
      align-items: center; padding: 0 0.75rem; gap: 8px;
      flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .mob-back { display: flex; align-items: center; gap: 4px; color: #aaa; font-size: 0.75rem; text-decoration: none; flex-shrink: 0; white-space: nowrap; }
    .mob-title { color: #ccc; font-size: 0.78rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mob-page { font-size: 0.72rem; color: #888; white-space: nowrap; flex-shrink: 0; }
    .mob-nav { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .mob-btn { background: none; border: none; color: #aaa; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mob-btn:disabled { opacity: 0.3; }
    .mob-btn:active { background: #333; }
    .mobile-bottombar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-h); background: #181818; border-top: 1px solid #2e2e2e;
      align-items: center; justify-content: space-around; z-index: 100; padding: 0 0.5rem;
    }
    .mob-action {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: #aaa; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background 0.1s; font-family: var(--sans); flex: 1;
    }
    .mob-action:active, .mob-action.active { background: #2e2e2e; color: #fff; }
    .mob-action span { font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── ZOOM POPUP ── */
    .zoom-popup {
      display: none; position: fixed; top: calc(var(--toolbar-h) + 4px); right: 170px;
      background: #222; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 8px 12px; z-index: 200; gap: 6px; align-items: center; white-space: nowrap;
    }
    .zoom-popup.open { display: flex; }
    .zoom-popup button {
      background: #333; border: none; color: #ccc; height: 28px;
      border-radius: 4px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; padding: 0 9px;
    }
    .zoom-popup button:hover { background: #444; color: #fff; }
    .zoom-label { font-size: 0.78rem; color: #aaa; min-width: 40px; text-align: center; }
    .zoom-sep { width: 1px; height: 20px; background: #3a3a3a; }
    .zoom-fit-btn { font-size: 0.68rem !important; padding: 0 8px !important; background: #2a2a2a !important; border: 1px solid #3a3a3a !important; }
    .zoom-fit-btn.on { background: #555 !important; color: #fff !important; }
    @media (max-width: 700px) { .zoom-popup { right: 8px; max-width: calc(100vw - 16px); flex-wrap: wrap; } }

    /* ── TILE OVERLAY ── */
    .tile-overlay { display: none; position: fixed; inset: 0; top: var(--toolbar-h); background: #1e1e1e; z-index: 150; overflow-y: auto; padding: 1.5rem; }
    .tile-overlay.open { display: block; }
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; max-width: 1200px; margin: 0 auto; }
    .tile-item { cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s; background: #2a2a2a; }
    .tile-item:hover { border-color: #555; }
    .tile-item.current { border-color: var(--accent); }
    .tile-item img { width: 100%; display: block; }
    .tile-page-num { text-align: center; font-size: 0.62rem; color: #888; padding: 4px 0; background: #222; }

    /* ── SEARCH SIDEBAR ── */
    .body-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
    .search-sidebar { width: 0; flex-shrink: 0; background: #1a1a1a; border-right: 1px solid #2e2e2e; overflow: hidden; transition: width 0.2s ease; display: flex; flex-direction: column; z-index: 90; }
    .search-sidebar.open { width: var(--search-w); }
    @media (max-width: 700px) {
      .search-sidebar { position: fixed; top: var(--toolbar-h); bottom: var(--bottom-h); left: 0; width: 0; z-index: 120; }
      .search-sidebar.open { width: min(var(--search-w), 90vw); }
    }
    .search-inner { width: var(--search-w); padding: 12px; display: flex; flex-direction: column; gap: 10px; height: 100%; overflow: hidden; }
    .search-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .search-header span { font-size: 0.72rem; color: #777; letter-spacing: 0.08em; text-transform: uppercase; }
    .search-close { background: none; border: none; color: #555; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
    .search-close:hover { background: #333; color: #ccc; }
    .search-row { display: flex; gap: 6px; flex-shrink: 0; }
    .search-input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #ddd; border-radius: 4px; padding: 7px 10px; font-size: 0.8rem; font-family: var(--sans); outline: none; min-width: 0; }
    .search-input:focus { border-color: #555; }
    .search-go { background: var(--accent); border: none; color: #fff; border-radius: 4px; padding: 7px 12px; font-size: 0.76rem; font-family: var(--sans); cursor: pointer; flex-shrink: 0; }
    .search-go:hover { background: var(--accent2); }
    .search-status { font-size: 0.7rem; color: #666; flex-shrink: 0; min-height: 16px; }
    .search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
    .sr-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px; background: #222; border-radius: 4px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; flex-shrink: 0; }
    .sr-item:hover { background: #2e2e2e; border-color: #3a3a3a; }
    .sr-item.active-result { border-color: var(--accent); }
    .sr-thumb { width: 32px; height: 44px; object-fit: cover; border-radius: 2px; background: #333; flex-shrink: 0; }
    .sr-info { flex: 1; min-width: 0; }
    .sr-page { font-size: 0.68rem; color: #666; margin-bottom: 3px; }
    .sr-match { font-size: 0.73rem; color: #bbb; line-height: 1.5; word-break: break-word; }
    .sr-match mark { background: rgba(160,20,20,0.5); color: #ff9999; border-radius: 2px; padding: 0 2px; font-style: normal; }

    /* ── STAGE + FLIPBOOK ── */
    .main-area { flex: 1; display: flex; overflow: hidden; }
    .stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    #flipbook-container { position: relative; display: none; transform-origin: center center; }

    /* ── PDF VIEW ──
       .pdf-view        = outer scroll container (fixed, overflow:auto)
       .pdf-view-inner  = inner column, scaled by JS transform for zoom
    ── */
    .pdf-view { display: none; flex: 1; overflow: auto; }
    .pdf-view.active { display: block; }
    .pdf-view-inner {
      display: flex; flex-direction: column; align-items: center;
      padding: 1rem; gap: 0;
      transform-origin: top center;
      /* width must be at least 100% so centering works at any zoom */
      min-width: 100%;
    }

    /* ── PDF PAGE WRAP ──
       Sized in canvas-pixel dimensions by JS.
       max-width caps it on narrow screens.
       All child overlays use %-coords → scale-proof.
    ── */
    .pdf-page-wrap {
      position: relative; flex-shrink: 0; margin-bottom: 8px;
      max-width: calc(100vw - 2rem);
      box-shadow: 0 4px 20px rgba(0,0,0,0.55);
    }
    /* Placeholder shown while lazy page hasn't rendered yet */
    .pdf-page-wrap.placeholder {
      background: #333;
      display: flex; align-items: center; justify-content: center;
    }
    .pdf-page-wrap.placeholder::after {
      content: ''; width: 28px; height: 28px; border: 3px solid #555;
      border-top-color: #aaa; border-radius: 50%; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .pdf-page-wrap canvas { display: block; width: 100%; height: auto; }

    /* Highlight marks — %-positioned, no pointer-events */
    .hl-mark {
      position: absolute; pointer-events: none;
      background: rgba(255, 190, 0, 0.50);
      border: 2px solid rgba(200, 130, 0, 0.90);
      border-radius: 2px; z-index: 4;
    }

    /* Link overlays — %-positioned, clickable */
    .pdf-link {
      position: absolute; pointer-events: auto; cursor: pointer; z-index: 5;
      background: rgba(70, 130, 255, 0.06);
      border: 1px solid rgba(70, 130, 255, 0.22);
      border-radius: 2px; transition: background 0.12s;
    }
    .pdf-link:hover { background: rgba(70, 130, 255, 0.18); }

    /* Flipbook highlight boxes */
    .hl-box {
      position: absolute; pointer-events: none; border-radius: 2px; z-index: 6;
      background: rgba(255, 190, 0, 0.50);
      border: 2px solid rgba(200, 130, 0, 0.90);
      animation: hl-fade 5s forwards;
    }
    @keyframes hl-fade { 0%,70%{opacity:1} 100%{opacity:0} }

    /* PDF view side-nav arrows (mobile only, shown only in PDF mode) */
    .pdf-side-nav {
      display: none; position: fixed; top: 50%; transform: translateY(-50%);
      z-index: 80; background: rgba(0,0,0,0.50); border: none;
      color: #ddd; width: 30px; height: 60px; border-radius: 4px;
      cursor: pointer; align-items: center; justify-content: center;
      transition: background 0.15s;
    }
    .pdf-side-nav:disabled { opacity: 0.2; cursor: default; }
    .pdf-side-nav.left  { left: 2px; }
    .pdf-side-nav.right { right: 2px; }
    /* Only show when in PDF mode on mobile */
    body.pdf-mode .pdf-side-nav { display: flex; }
    @media (min-width: 701px) { .pdf-side-nav { display: none !important; } }

    /* Loading / Error */
    .loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; background: #2a2a2a; z-index: 20; }
    .loading.hidden { display: none; }
    .load-title { color: #ccc; font-size: 0.88rem; text-align: center; padding: 0 2rem; }
    .progress-track { width: 240px; height: 3px; background: #3a3a3a; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.2s ease; }
    .load-status { font-size: 0.72rem; color: #666; }
    .error { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; background: #2a2a2a; z-index: 20; }
    .error.show { display: flex; }
    .error h2 { color: #ddd; font-size: 1rem; font-weight: 500; }
    .error p { color: #777; font-size: 0.82rem; max-width: 340px; line-height: 1.6; }
    .error a { color: #c06060; font-size: 0.82rem; }
    :fullscreen .toolbar, :-webkit-full-screen .toolbar { z-index: 100; }
  </style>
</head>
<body>

<!-- DESKTOP TOOLBAR -->
<div class="toolbar">
  <a class="tb-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Publications
  </a>
  <span class="tb-title" id="doc-title">Loading…</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-first" disabled onclick="goFirst()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
  </button>
  <button class="tb-btn" id="btn-prev" disabled onclick="goPrev()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="tb-page" id="page-indicator">— / —</span>
  <button class="tb-btn" id="btn-next" disabled onclick="goNext()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="tb-btn" id="btn-last" disabled onclick="goLast()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-zoom" disabled onclick="toggleZoom()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
  </button>
  <button class="tb-btn" id="btn-tiles" disabled onclick="toggleTiles()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </button>
  <button class="tb-btn" id="btn-search" disabled onclick="toggleSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button class="tb-btn" id="btn-fs" disabled onclick="toggleFullscreen()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-view-toggle" id="btn-view-toggle" disabled onclick="toggleViewMode()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF View
  </button>
  <div class="tb-sep"></div>
  <a class="tb-download" id="dl-btn" href="#" download>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </a>
</div>

<!-- MOBILE TOP BAR -->
<div class="mobile-topbar">
  <a class="mob-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back
  </a>
  <span class="mob-title" id="mob-title">Loading…</span>
  <span class="mob-page" id="mob-page">—/—</span>
  <div class="mob-nav">
    <button class="mob-btn" id="mob-prev" disabled onclick="goPrev()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="mob-btn" id="mob-next" disabled onclick="goNext()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<!-- ZOOM POPUP -->
<div class="zoom-popup" id="zoom-popup">
  <button onclick="changeZoom(-0.15)" style="width:28px;">−</button>
  <span class="zoom-label" id="zoom-label">100%</span>
  <button onclick="changeZoom(+0.15)" style="width:28px;">+</button>
  <button onclick="resetZoom()" style="font-size:0.68rem;padding:0 7px;">Reset</button>
  <div class="zoom-sep"></div>
  <button class="zoom-fit-btn" id="btn-fit-w" onclick="fitWidth()">Width</button>
  <button class="zoom-fit-btn" id="btn-fit-p" onclick="fitPage()">Page</button>
</div>

<!-- TILE OVERLAY -->
<div class="tile-overlay" id="tile-overlay">
  <div class="tile-grid" id="tile-grid"></div>
</div>

<!-- BODY -->
<div class="body-wrap">
  <div class="search-sidebar" id="search-sidebar">
    <div class="search-inner">
      <div class="search-header">
        <span>Search</span>
        <button class="search-close" onclick="toggleSearch()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="search-row">
        <input class="search-input" id="search-input" type="text" placeholder="Page number or keyword…" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="search-go" onclick="doSearch()">Go</button>
      </div>
      <div class="search-status" id="search-status">Enter a page number or keyword.</div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="stage" id="stage">
      <div class="loading" id="loading">
        <span class="load-title" id="load-title">Preparing document…</span>
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="load-status" id="load-status">Starting…</span>
      </div>
      <div class="error" id="error">
        <h2>Could not load document</h2>
        <p id="error-msg">Check the file is in the pdfs/ folder and publications.json is correct.</p>
        <a href="index.html">← Back to publications</a>
      </div>
      <div id="flipbook-container"><div id="flipbook"></div></div>
    </div>
    <div class="pdf-view" id="pdf-view">
      <div class="pdf-view-inner" id="pdf-view-inner"></div>
    </div>
  </div>
</div>

<!-- PDF SIDE NAV (mobile, PDF mode only) -->
<button class="pdf-side-nav left" id="pdf-nav-prev" onclick="pdfNavPrev()" disabled>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
</button>
<button class="pdf-side-nav right" id="pdf-nav-next" onclick="pdfNavNext()" disabled>
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
</button>

<!-- MOBILE BOTTOM BAR -->
<div class="mobile-bottombar">
  <button class="mob-action" id="mob-tiles" onclick="toggleTiles()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Pages</span>
  </button>
  <button class="mob-action" id="mob-search-btn" onclick="toggleSearch()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="mob-action" id="mob-view-btn" onclick="toggleViewMode()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="mob-view-label">PDF View</span>
  </button>
  <button class="mob-action" id="mob-fs-btn" onclick="toggleFullscreen()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    <span>Fullscreen</span>
  </button>
  <a class="mob-action" id="mob-dl" href="#" download>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>Download</span>
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
'use strict';
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ─────────────────────────────────────────────
// CONFIG
// ─────────────────────────────────────────────
const FLIPBOOK_SCALE  = 2.5;   // render quality for flipbook images
const THUMB_SCALE     = 0.28;  // thumbnail quality
const PDF_SCALE       = 2.5;   // render quality for PDF view pages
const LAZY_WINDOW     = 2;     // render this many pages ahead/behind current in PDF view
const SEARCH_IDLE_MS  = 300;   // debounce for search index build status

// ─────────────────────────────────────────────
// URL PARAMS + TITLES
// ─────────────────────────────────────────────
const params   = new URLSearchParams(window.location.search);
const pdfFile  = params.get('file')  || '';
const pdfTitle = params.get('title') || 'Document';
const isMobile = window.innerWidth <= 700;

document.title = pdfTitle + ' — DoMS Publications';
['doc-title','mob-title','load-title'].forEach(id => {
  const el = document.getElementById(id); if (el) el.textContent = pdfTitle;
});
document.getElementById('dl-btn').href     = pdfFile;
document.getElementById('dl-btn').download = pdfFile.split('/').pop();
const mobDl = document.getElementById('mob-dl');
mobDl.href = pdfFile; mobDl.download = pdfFile.split('/').pop();

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
let pdfDocRef    = null;
let totalPages   = 0;
let currentPage  = 1;
let viewMode     = 'flipbook';   // 'flipbook' | 'pdf'
let pageFlip     = null;

// Flipbook
let allDataUrls  = [];           // index 0 = page 1; populated lazily for flipbook
let thumbUrls    = [];
let flipbookBuilt = [];          // boolean per page: has the image been generated?
let dispW = 0, dispH = 0;
let pageUserW = 0, pageUserH = 0;
let flipZoom = 1.0;

// PDF view
let pdfPageWraps = [];           // 1-indexed: { el, items[], W, H, rendered }
let pdfViewInitialised = false;
let pdfZoom = 1.0;
let pdfObserver = null;

// Search index: built once, reused on every query
// searchIndex[i] = { text: string (full lowercase), items: [{str,left,top,w,h}] }
let searchIndex = [];            // 1-indexed
let searchIndexBuilt = false;
let searchIndexBuilding = false;

// ─────────────────────────────────────────────
// UTILS
// ─────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('load-status').textContent  = msg;
}
function showError(msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}

// Render one PDF page to a new <canvas> at the given scale.
// Returns { canvas, page, viewport }
async function renderPage(pageNum, scale) {
  const page = await pdfDocRef.getPage(pageNum);
  const vp   = page.getViewport({ scale });
  const c    = document.createElement('canvas');
  c.width    = Math.floor(vp.width);
  c.height   = Math.floor(vp.height);
  const ctx  = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return { canvas: c, page, viewport: vp };
}

// ─────────────────────────────────────────────
// SEARCH INDEX
// Build once (async, background) after first boot.
// Stores full lowercased text + precomputed %-positioned rects per page.
// ─────────────────────────────────────────────
async function buildSearchIndex() {
  if (searchIndexBuilt || searchIndexBuilding || !pdfDocRef) return;
  searchIndexBuilding = true;
  for (let i = 1; i <= totalPages; i++) {
    try {
      const page    = await pdfDocRef.getPage(i);
      const content = await page.getTextContent();
      const vp1     = page.getViewport({ scale: 1 });
      const W = vp1.width, H = vp1.height; // user-space dims (for % calc at scale=1)

      const items = [];
      let fullText = '';
      content.items.forEach(item => {
        if (!item.str) return;
        fullText += item.str + ' ';
        if (!item.str.trim()) return;
        const [a, b, , , e, f] = item.transform;
        const fs = Math.sqrt(a * a + b * b);
        if (fs < 0.5) return;
        // Store coords in user-space % — viewportconversion happens at highlight time
        items.push({
          str:  item.str.toLowerCase(),
          // canvas-px at scale=1, then as % of page user-space dims
          left: (e / W * 100).toFixed(3),
          top:  ((H - f - fs * 1.15) / H * 100).toFixed(3),
          w:    ((Math.abs(item.width) || fs * item.str.length * 0.55) / W * 100).toFixed(3),
          h:    (fs * 1.35 / H * 100).toFixed(3),
        });
      });
      searchIndex[i] = { text: fullText.toLowerCase(), items };
    } catch(e) { searchIndex[i] = { text: '', items: [] }; }
    // Yield to browser every 5 pages so UI stays responsive
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }
  searchIndexBuilt = true;
  searchIndexBuilding = false;
}

// ─────────────────────────────────────────────
// FLIPBOOK BOOT
// Strategy: render first 3 pages immediately, queue the rest lazily
// using requestIdleCallback so the main thread stays free.
// ─────────────────────────────────────────────
async function loadFlipbook() {
  totalPages = pdfDocRef.numPages;
  setProgress(3, 'Calculating layout…');

  // Get user-space page dimensions (needed for highlight coordinate mapping)
  const page1 = await pdfDocRef.getPage(1);
  const vp1u  = page1.getViewport({ scale: 1 });
  pageUserW = vp1u.width; pageUserH = vp1u.height;

  // Render page 1 to calculate display dimensions
  const { canvas: fc } = await renderPage(1, FLIPBOOK_SCALE);
  const srcW = fc.width, srcH = fc.height;
  const stageH = window.innerHeight - (isMobile ? 52 + 56 : 52) - 20;
  const stageW = window.innerWidth  - 20;
  const dScale = isMobile
    ? Math.min(stageH / srcH, stageW / srcW, 1)
    : Math.min(stageH / srcH, (stageW / 2) / srcW, 1);
  dispW = Math.floor(srcW * dScale);
  dispH = Math.floor(srcH * dScale);

  // Pre-render pages 1–3 and thumbnails for all pages
  setProgress(10, 'Rendering initial pages…');
  allDataUrls = new Array(totalPages).fill(null);
  thumbUrls   = new Array(totalPages).fill(null);
  flipbookBuilt = new Array(totalPages).fill(false);

  allDataUrls[0] = fc.toDataURL('image/jpeg', 0.92);
  const { canvas: ft } = await renderPage(1, THUMB_SCALE);
  thumbUrls[0] = ft.toDataURL('image/jpeg', 0.75);
  flipbookBuilt[0] = true;

  const EAGER = Math.min(3, totalPages);
  for (let i = 2; i <= EAGER; i++) {
    setProgress(10 + Math.round((i / EAGER) * 30), `Rendering page ${i}…`);
    const { canvas: full  } = await renderPage(i, FLIPBOOK_SCALE);
    allDataUrls[i - 1] = full.toDataURL('image/jpeg', 0.92);
    const { canvas: thumb } = await renderPage(i, THUMB_SCALE);
    thumbUrls[i - 1] = thumb.toDataURL('image/jpeg', 0.75);
    flipbookBuilt[i - 1] = true;
  }

  // Render thumbnails for remaining pages (small, fast)
  setProgress(45, 'Generating thumbnails…');
  for (let i = EAGER + 1; i <= totalPages; i++) {
    const { canvas: thumb } = await renderPage(i, THUMB_SCALE);
    thumbUrls[i - 1] = thumb.toDataURL('image/jpeg', 0.75);
    if (i % 8 === 0) await new Promise(r => setTimeout(r, 0));
  }

  setProgress(75, 'Building flipbook…');
  const container = document.getElementById('flipbook-container');
  const flipEl    = document.getElementById('flipbook');
  flipEl.innerHTML = '';
  const containerW = isMobile ? dispW : dispW * 2;
  flipEl.style.cssText    = `width:${containerW}px;height:${dispH}px;`;
  container.style.cssText = `width:${containerW}px;height:${dispH}px;transform-origin:center center;`;

  // Build page divs — lazy pages use a placeholder until rendered
  for (let idx = 0; idx < totalPages; idx++) {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.pageNum = idx + 1;
    div.style.cssText = `width:${dispW}px;height:${dispH}px;overflow:hidden;background:#fff;position:relative;`;
    if (allDataUrls[idx]) {
      const img = document.createElement('img');
      img.src = allDataUrls[idx];
      img.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;`;
      div.appendChild(img);
    } else {
      // Placeholder — will be filled when user reaches this page
      div.dataset.lazy = '1';
      div.style.background = '#e8e8e8';
    }
    flipEl.appendChild(div);
  }

  setProgress(90, 'Initialising flipbook…');
  pageFlip = new St.PageFlip(container, {
    width: dispW, height: dispH, size: 'fixed',
    showCover: true, usePortrait: isMobile,
    mobileScrollSupport: false, flippingTime: 600, maxShadowOpacity: 0.5,
  });
  pageFlip.loadFromHTML(flipEl.querySelectorAll('.page'));
  pageFlip.on('flip', async e => {
    currentPage = e.data + 1;
    updateControls();
    await ensureFlipbookPages(currentPage);
    saveState();
  });

  // Restore saved page
  const saved = loadState();
  if (saved > 1 && saved <= totalPages) {
    pageFlip.flip(saved - 1);
    currentPage = saved;
  }

  setProgress(100, 'Ready');
  document.getElementById('loading').classList.add('hidden');
  container.style.display = 'block';
  enableControls(); updateControls(); buildTileGrid();

  // Start rendering remaining pages in background
  scheduleRemainingFlipbookPages(EAGER + 1);
  // Start building search index in background
  setTimeout(buildSearchIndex, 500);
}

// Render pages around the current page that haven't been rendered yet
async function ensureFlipbookPages(pageNum) {
  const range = [pageNum - 1, pageNum, pageNum + 1, pageNum + 2];
  for (const p of range) {
    if (p < 1 || p > totalPages || flipbookBuilt[p - 1]) continue;
    try {
      const { canvas: full  } = await renderPage(p, FLIPBOOK_SCALE);
      allDataUrls[p - 1] = full.toDataURL('image/jpeg', 0.92);
      flipbookBuilt[p - 1] = true;
      // Patch the placeholder div
      const div = document.querySelector(`#flipbook .page[data-page-num="${p}"]`);
      if (div && div.dataset.lazy) {
        delete div.dataset.lazy;
        div.style.background = '#fff';
        const img = document.createElement('img');
        img.src = allDataUrls[p - 1];
        img.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;`;
        div.appendChild(img);
        // If PageFlip has already rendered this page as a texture it won't update.
        // Reload the page image in pageFlip
        try { pageFlip.updateFromData([{ index: p - 1, data: allDataUrls[p - 1] }]); } catch(e) {}
      }
    } catch(e) { /* skip */ }
  }
}

// Schedule remaining pages in idle time — no jank
function scheduleRemainingFlipbookPages(startFrom) {
  let i = startFrom;
  function step(deadline) {
    while (i <= totalPages && (deadline.timeRemaining() > 8 || deadline.didTimeout)) {
      if (!flipbookBuilt[i - 1]) {
        renderPage(i, FLIPBOOK_SCALE).then(({ canvas }) => {
          allDataUrls[i - 1] = canvas.toDataURL('image/jpeg', 0.92);
          flipbookBuilt[i - 1] = true;
          // Update tile thumbnail if we now have a better image — skip, thumbs already built
        }).catch(() => {});
      }
      i++;
    }
    if (i <= totalPages) {
      if ('requestIdleCallback' in window) requestIdleCallback(step, { timeout: 2000 });
      else setTimeout(() => step({ timeRemaining: () => 16, didTimeout: false }), 100);
    }
  }
  if ('requestIdleCallback' in window) requestIdleCallback(step, { timeout: 2000 });
  else setTimeout(() => step({ timeRemaining: () => 16, didTimeout: false }), 200);
}

// ─────────────────────────────────────────────
// STATE PERSISTENCE (localStorage)
// ─────────────────────────────────────────────
function stateKey() { return 'doms_reader_' + (pdfFile || 'default'); }
function saveState() {
  try { localStorage.setItem(stateKey(), JSON.stringify({ page: currentPage, mode: viewMode })); } catch(e) {}
}
function loadState() {
  try {
    const d = JSON.parse(localStorage.getItem(stateKey()) || '{}');
    return d.page || 1;
  } catch(e) { return 1; }
}

// ─────────────────────────────────────────────
// CONTROLS
// ─────────────────────────────────────────────
function enableControls() {
  ['btn-first','btn-prev','btn-next','btn-last','btn-zoom','btn-tiles','btn-search','btn-fs','btn-view-toggle']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
  ['mob-prev','mob-next','mob-tiles','mob-search-btn','mob-view-btn','mob-fs-btn']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
}
function updateControls() {
  const txt = `${currentPage} / ${totalPages}`;
  const e1 = document.getElementById('page-indicator'), e2 = document.getElementById('mob-page');
  if (e1) e1.textContent = txt;
  if (e2) e2.textContent = txt;
  ['btn-first','btn-prev'].forEach(id => document.getElementById(id).disabled = currentPage <= 1);
  ['btn-next','btn-last' ].forEach(id => document.getElementById(id).disabled = currentPage >= totalPages);
  const mp = document.getElementById('mob-prev'), mn = document.getElementById('mob-next');
  if (mp) mp.disabled = currentPage <= 1;
  if (mn) mn.disabled = currentPage >= totalPages;
  const pnp = document.getElementById('pdf-nav-prev'), pnn = document.getElementById('pdf-nav-next');
  if (pnp) pnp.disabled = currentPage <= 1;
  if (pnn) pnn.disabled = currentPage >= totalPages;
  document.querySelectorAll('.tile-item').forEach((t,i) =>
    t.classList.toggle('current', i + 1 === currentPage));
}

function goFirst() { if (viewMode==='flipbook' && pageFlip) pageFlip.flip(0); }
function goLast()  { if (viewMode==='flipbook' && pageFlip) pageFlip.flip(totalPages - 1); }
function goPrev()  { if (viewMode==='flipbook' && pageFlip) pageFlip.flipPrev(); }
function goNext()  { if (viewMode==='flipbook' && pageFlip) pageFlip.flipNext(); }
function pdfNavPrev() { if (currentPage > 1) scrollToPdfPage(currentPage - 1); }
function pdfNavNext() { if (currentPage < totalPages) scrollToPdfPage(currentPage + 1); }

async function goToPage(n, match) {
  if (viewMode === 'flipbook') {
    if (!pageFlip) return;

    await ensureFlipbookPages(n);

    pageFlip.flip(n - 1);

    pageFlip.once('flip', () => {
      if (match) highlightFlipbook(n, match);
    });

  } else {
    scrollToPdfPage(n);

    if (match) {
      setTimeout(() => highlightPdfView(n, match), 200);
    }
  }

  saveState();
}

// ─────────────────────────────────────────────
// ZOOM — works for both modes
// ─────────────────────────────────────────────
function toggleZoom() {
  const p = document.getElementById('zoom-popup');
  p.classList.toggle('open');
  document.getElementById('btn-zoom').classList.toggle('active', p.classList.contains('open'));
  refreshZoomLabel();
}
function refreshZoomLabel() {
  const z = viewMode === 'pdf' ? pdfZoom : flipZoom;
  document.getElementById('zoom-label').textContent = Math.round(z * 100) + '%';
}
function applyFlipZoom() {
  document.getElementById('flipbook-container').style.transform = `scale(${flipZoom})`;
  refreshZoomLabel();
}
function applyPdfZoom() {
  document.getElementById('pdf-view-inner').style.transform = `scale(${pdfZoom})`;
  refreshZoomLabel();
}
function changeZoom(d) {
  clearFitButtons();
  if (viewMode === 'pdf') {
    pdfZoom = clamp(Math.round((pdfZoom + d) * 20) / 20, 0.3, 3);
    applyPdfZoom();
  } else {
    flipZoom = clamp(Math.round((flipZoom + d) * 20) / 20, 0.3, 2.5);
    applyFlipZoom();
  }
}
function resetZoom() {
  clearFitButtons();
  if (viewMode === 'pdf') { pdfZoom = 1; applyPdfZoom(); }
  else { flipZoom = 1; applyFlipZoom(); }
}
function fitWidth() {
  if (viewMode !== 'pdf') return;
  const pw = pdfPageWraps.find(w => w);
  if (!pw) return;
  const outerW = document.getElementById('pdf-view').clientWidth - 32;
  const naturalW = Math.min(pw.W, window.innerWidth - 32);
  pdfZoom = clamp(outerW / naturalW, 0.3, 3);
  applyPdfZoom();
  document.getElementById('btn-fit-w').classList.add('on');
  document.getElementById('btn-fit-p').classList.remove('on');
}
function fitPage() {
  if (viewMode !== 'pdf') return;
  const pw = pdfPageWraps.find(w => w);
  if (!pw) return;
  const outerW = document.getElementById('pdf-view').clientWidth  - 32;
  const outerH = document.getElementById('pdf-view').clientHeight - 32;
  const natW   = Math.min(pw.W, window.innerWidth - 32);
  const natH   = pw.H * (natW / pw.W);
  pdfZoom = clamp(Math.min(outerW / natW, outerH / natH), 0.2, 3);
  applyPdfZoom();
  document.getElementById('btn-fit-p').classList.add('on');
  document.getElementById('btn-fit-w').classList.remove('on');
}
function clearFitButtons() {
  document.getElementById('btn-fit-w').classList.remove('on');
  document.getElementById('btn-fit-p').classList.remove('on');
}
function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }

// ─────────────────────────────────────────────
// FULLSCREEN
// ─────────────────────────────────────────────
const FS_ENTER = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const FS_EXIT  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('btn-fs').innerHTML = document.fullscreenElement ? FS_EXIT : FS_ENTER;
});

// ─────────────────────────────────────────────
// TILE VIEW
// ─────────────────────────────────────────────
function buildTileGrid() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  thumbUrls.forEach((url, i) => {
    const item = document.createElement('div');
    item.className = 'tile-item' + (i === 0 ? ' current' : '');
    item.onclick = () => { toggleTiles(); goToPage(i + 1); };
    const img = document.createElement('img'); img.src = url;
    const num = document.createElement('div');
    num.className = 'tile-page-num'; num.textContent = 'Page ' + (i + 1);
    item.appendChild(img); item.appendChild(num);
    grid.appendChild(item);
  });
}
function toggleTiles() {
  const o = document.getElementById('tile-overlay');
  o.classList.toggle('open');
  document.getElementById('btn-tiles').classList.toggle('active', o.classList.contains('open'));
  document.getElementById('mob-tiles').classList.toggle('active', o.classList.contains('open'));
  if (o.classList.contains('open')) {
    const cur = o.querySelector('.current'); if (cur) cur.scrollIntoView({ block: 'center' });
  }
}

// ─────────────────────────────────────────────
// VIEW MODE TOGGLE
// ─────────────────────────────────────────────
async function toggleViewMode() {
  if (viewMode === 'flipbook') {
    viewMode = 'pdf';
    document.body.classList.add('pdf-mode');
    document.getElementById('stage').style.display = 'none';
    document.getElementById('pdf-view').classList.add('active');

    if (!pdfViewInitialised) {
      await initialisePdfView();
    }

    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = true);
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg> Flipbook`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = 'Flipbook';
    updateControls(); refreshZoomLabel();
    // Restore scroll position to current page
    if (pdfPageWraps[currentPage]) scrollToPdfPage(currentPage);
  } else {
    viewMode = 'flipbook';
    document.body.classList.remove('pdf-mode');
    document.getElementById('pdf-view').classList.remove('active');
    document.getElementById('stage').style.display = '';
    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = false);
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> PDF View`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = 'PDF View';
    updateControls(); refreshZoomLabel();
  }
  saveState();
}

// ─────────────────────────────────────────────
// PDF VIEW INITIALISATION
// Lazy: build placeholder wrappers for all pages, render only first visible window.
// ─────────────────────────────────────────────
async function initialisePdfView() {
  const inner = document.getElementById('pdf-view-inner');
  inner.innerHTML = ''; pdfPageWraps = [];

  // We need page dimensions to size placeholders — use page 1
  const { canvas: c1, page: p1, viewport: vp1 } = await renderPage(1, PDF_SCALE);
  const W = c1.width, H = c1.height;

  // Build all placeholder wrappers immediately (no rendering)
  for (let i = 1; i <= totalPages; i++) {
    const wrap = document.createElement('div');
    wrap.className = 'pdf-page-wrap placeholder';
    wrap.dataset.pageNum = i;
    // Size all pages with same aspect ratio as page 1 (good enough for placeholders)
    wrap.style.width  = W + 'px';
    wrap.style.height = H + 'px';
    inner.appendChild(wrap);
    pdfPageWraps[i] = { el: wrap, items: null, W, H, rendered: false };
  }

  // Render page 1 immediately
  await renderPdfPage(1, c1, p1, vp1);

  // Set up IntersectionObserver to lazy-render pages as they scroll into view
  setupPdfLazyObserver();

  // Render a small window around page 1 eagerly
  for (let i = 2; i <= Math.min(LAZY_WINDOW + 1, totalPages); i++) {
    await renderPdfPage(i);
  }

  pdfViewInitialised = true;
}

// Render one PDF page into its existing placeholder wrap.
// Accepts optional pre-rendered canvas/page/viewport to avoid double-render.
async function renderPdfPage(pageNum, preCanvas, prePage, preViewport) {
  const pw = pdfPageWraps[pageNum];
  if (!pw || pw.rendered) return;
  pw.rendered = true; // mark immediately to prevent duplicate renders

  let canvas, page, viewport;
  if (preCanvas) {
    canvas = preCanvas; page = prePage; viewport = preViewport;
  } else {
    ({ canvas, page, viewport } = await renderPage(pageNum, PDF_SCALE));
  }

  const W = canvas.width, H = canvas.height;
  pw.W = W; pw.H = H;

  // Remove placeholder styling
  pw.el.classList.remove('placeholder');
  pw.el.style.width  = W + 'px';
  pw.el.style.height = H + 'px';
  pw.el.innerHTML = '';
  pw.el.appendChild(canvas);

  // Build text item rects for highlights (stored as % of canvas dims)
  const content = await page.getTextContent();
  const items = [];
  content.items.forEach(item => {
    if (!item.str || !item.str.trim()) return;
    const [a, b, , , e, f] = item.transform;
    const fs = Math.sqrt(a * a + b * b);
    if (fs < 0.5) return;
    const cx = e * PDF_SCALE;
    const cy = H - (f * PDF_SCALE) - (fs * PDF_SCALE * 1.15);
    const cw = Math.abs(item.width) * PDF_SCALE;
    const ch = fs * PDF_SCALE * 1.35;
    items.push({
      str:  item.str.toLowerCase(),
      left: (cx / W * 100).toFixed(3),
      top:  (cy / H * 100).toFixed(3),
      w:    ((cw || ch * 0.6) / W * 100).toFixed(3),
      h:    (ch / H * 100).toFixed(3),
    });
  });
  pw.items = items;

  // Build link overlays
  try {
    const anns = await page.getAnnotations();
    anns.forEach(ann => {
      if (ann.subtype !== 'Link') return;
      const hasUrl  = ann.url && ann.url.trim();
      const hasDest = ann.dest != null;
      const hasAct  = ann.action != null;
      if (!hasUrl && !hasDest && !hasAct) return;

      const vr = viewport.convertToViewportRectangle(ann.rect);
      const x1 = Math.min(vr[0], vr[2]), y1 = Math.min(vr[1], vr[3]);
      const x2 = Math.max(vr[0], vr[2]), y2 = Math.max(vr[1], vr[3]);

      const a = document.createElement('a');
      a.className = 'pdf-link';
      a.style.left   = (x1 / W * 100).toFixed(3) + '%';
      a.style.top    = (y1 / H * 100).toFixed(3) + '%';
      a.style.width  = ((x2-x1) / W * 100).toFixed(3) + '%';
      a.style.height = ((y2-y1) / H * 100).toFixed(3) + '%';

      if (hasUrl) {
        a.href = ann.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = ann.url;
      } else {
        a.href = '#';
        const dest = ann.dest || (ann.action && ann.action.dest);
        a.addEventListener('click', async ev => {
          ev.preventDefault();
          if (!dest) return;
          try {
            const arr = typeof dest === 'string' ? await pdfDocRef.getDestination(dest) : dest;
            if (arr && arr[0]) scrollToPdfPage((await pdfDocRef.getPageIndex(arr[0])) + 1);
          } catch(e) {}
        });
      }
      pw.el.appendChild(a);
    });
  } catch(e) {}
}

function setupPdfLazyObserver() {
  if (pdfObserver) pdfObserver.disconnect();
  const pdfViewEl = document.getElementById('pdf-view');
  pdfObserver = new IntersectionObserver(async entries => {
    for (const entry of entries) {
      const n = parseInt(entry.target.dataset.pageNum);
      if (isNaN(n)) continue;
      if (entry.isIntersecting) {
        // Update current page indicator
        if (entry.intersectionRatio >= 0.3 && n !== currentPage) {
          currentPage = n; updateControls(); saveState();
        }
        // Render this page and neighbours
        const toRender = [n, n-1, n+1, n+2].filter(p => p >= 1 && p <= totalPages);
        for (const p of toRender) {
          if (!pdfPageWraps[p].rendered) await renderPdfPage(p);
        }
      }
    }
  }, { root: pdfViewEl, threshold: [0.1, 0.3, 0.5] });
  pdfPageWraps.forEach(pw => { if (pw) pdfObserver.observe(pw.el); });
}

function scrollToPdfPage(n) {
  if (!pdfPageWraps[n]) return;
  pdfPageWraps[n].el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  currentPage = n; updateControls(); saveState();
}

// ─────────────────────────────────────────────
// SEARCH
// Uses pre-built searchIndex when available; falls back to on-demand page fetch.
// ─────────────────────────────────────────────
function toggleSearch() {
  const s = document.getElementById('search-sidebar');
  s.classList.toggle('open');
  document.getElementById('btn-search').classList.toggle('active', s.classList.contains('open'));
  document.getElementById('mob-search-btn').classList.toggle('active', s.classList.contains('open'));
  if (s.classList.contains('open')) setTimeout(() => document.getElementById('search-input').focus(), 210);
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim().toLowerCase();
  if (!query) return;

  const statusEl = document.getElementById('search-status');
  const resultsEl = document.getElementById('search-results');

  resultsEl.innerHTML = '';
  statusEl.textContent = 'Searching…';

  const matches = [];

  if (!searchIndexBuilt) {
    statusEl.textContent = 'Index not ready yet…';
    return;
  }

  for (let i = 1; i <= totalPages; i++) {
    const si = searchIndex[i];
    if (!si) continue;

    si.items.forEach(item => {
      if (item.str.includes(query)) {
        matches.push({
          page: i,
          item: item
        });
      }
    });
  }

  if (!matches.length) {
    statusEl.textContent = `No results for "${query}"`;
    return;
  }

  statusEl.textContent = `${matches.length} results found`;

  matches.forEach(m => {
    const el = document.createElement('div');
    el.className = 'sr-item';

    el.onclick = () => {
      document.querySelectorAll('.sr-item').forEach(e => e.classList.remove('active-result'));
      el.classList.add('active-result');
      goToPage(m.page, m.item);
    };

    el.innerHTML = `
      <img class="sr-thumb" src="${thumbUrls[m.page - 1]}" />
      <div class="sr-info">
        <div class="sr-page">Page ${m.page}</div>
        <div class="sr-match">${m.item.str}</div>
      </div>
    `;

    resultsEl.appendChild(el);
  });
}
// ─────────────────────────────────────────────
// HIGHLIGHT — FLIPBOOK
// ─────────────────────────────────────────────
function highlightFlipbook(pageNum, match) {
  document.querySelectorAll('#flipbook .hl-box').forEach(el => el.remove());

  const page = document.querySelector(
    `#flipbook .page[data-page-num="${pageNum}"]`
  );

  if (!page) return;

  const box = document.createElement('div');
  box.className = 'hl-box';

  box.style.left = match.left + "%";
  box.style.top = match.top + "%";
  box.style.width = match.w + "%";
  box.style.height = match.h + "%";

  page.appendChild(box);
}

    const q = query.toLowerCase();
    const allDivs = [...document.querySelectorAll(`#flipbook .page[data-page-num="${pageNum}"]`)];
    const pageDiv = allDivs.find(d => d.offsetParent !== null) || allDivs[0];
    if (!pageDiv) return;

    let count = 0;
    items.forEach(item => {
      if (count >= 25 || !item.str.includes(q)) return;
      const box = document.createElement('div');
      box.className = 'hl-box';
      // Convert from % back to absolute dispW/dispH pixels
      box.style.left   = (parseFloat(item.left) / 100 * dispW).toFixed(1) + 'px';
      box.style.top    = (parseFloat(item.top)  / 100 * dispH).toFixed(1) + 'px';
      box.style.width  = Math.max(4, parseFloat(item.w) / 100 * dispW).toFixed(1) + 'px';
      box.style.height = Math.max(6, parseFloat(item.h) / 100 * dispH).toFixed(1) + 'px';
      pageDiv.appendChild(box);
      count++;
    });
  } catch(e) { console.warn('Flipbook highlight:', e); }
}

// ─────────────────────────────────────────────
// HIGHLIGHT — PDF VIEW
// ─────────────────────────────────────────────
function highlightPdfView(pageNum, match) {
  const pw = pdfPageWraps[pageNum];
  if (!pw || !pw.el) return;

  pw.el.querySelectorAll('.hl-mark').forEach(el => el.remove());

  const div = document.createElement('div');
  div.className = 'hl-mark';

  div.style.left = match.left + "%";
  div.style.top = match.top + "%";
  div.style.width = match.w + "%";
  div.style.height = match.h + "%";

  pw.el.appendChild(div);
}

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { viewMode==='flipbook' ? goNext() : pdfNavNext(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { viewMode==='flipbook' ? goPrev() : pdfNavPrev(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === '+' || e.key === '=') changeZoom(0.1);
  if (e.key === '-') changeZoom(-0.1);
  if (e.key === '0') resetZoom();
  if (e.key === 'Escape') {
    document.getElementById('tile-overlay').classList.remove('open');
    document.getElementById('zoom-popup').classList.remove('open');
    if (document.fullscreenElement) document.exitFullscreen();
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('#zoom-popup') && !e.target.closest('#btn-zoom'))
    document.getElementById('zoom-popup').classList.remove('open');
});

// ─────────────────────────────────────────────
// BOOT
// ─────────────────────────────────────────────
async function boot() {
  if (!pdfFile) { showError('No PDF file specified.'); return; }
  try {
    setProgress(2, 'Fetching document…');
    pdfDocRef = await pdfjsLib.getDocument({
      url: new URL(pdfFile, window.location.href).href,
      withCredentials: false,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
    }).promise;
    await loadFlipbook();
  } catch(e) {
    console.error('BOOT ERROR:', e);
    showError(`Could not load "${pdfFile}". Make sure the file exists in the pdfs/ folder.`);
  }
}
boot();

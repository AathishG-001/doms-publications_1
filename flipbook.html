<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Reader — DoMS Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #8b1a1a;
      --accent2: #a02020;
      --toolbar-h: 52px;
      --bottom-h: 56px;
      --search-w: 300px;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: #2a2a2a; font-family: var(--sans); }
    body { display: flex; flex-direction: column; }

    .toolbar {
      height: var(--toolbar-h); background: #181818;
      display: flex; align-items: center; padding: 0 0.75rem;
      gap: 4px; flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .tb-back {
      display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.78rem;
      text-decoration: none; padding: 6px 10px 6px 0; border-right: 1px solid #2e2e2e;
      margin-right: 4px; white-space: nowrap; transition: color 0.15s; flex-shrink: 0;
    }
    .tb-back:hover { color: #fff; }
    .tb-title { color: #ccc; font-size: 0.82rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-sep { width: 1px; height: 22px; background: #2e2e2e; flex-shrink: 0; margin: 0 2px; }
    .tb-btn {
      background: none; border: none; color: #aaa; width: 32px; height: 32px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .tb-btn:hover:not(:disabled) { background: #2e2e2e; color: #fff; }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }
    .tb-btn.active { background: #333; color: #fff; }
    .tb-page { font-size: 0.73rem; color: #888; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .tb-download {
      display: flex; align-items: center; gap: 4px; background: var(--accent);
      color: #fff; border: none; border-radius: 4px; padding: 5px 10px;
      font-size: 0.72rem; font-family: var(--sans); cursor: pointer;
      transition: opacity 0.15s; flex-shrink: 0; text-decoration: none; white-space: nowrap;
    }
    .tb-download:hover { opacity: 0.85; }
    .tb-view-toggle {
      background: #2e2e2e; border: 1px solid #3a3a3a; color: #ccc;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      gap: 4px; padding: 0 8px; height: 28px; font-size: 0.7rem;
      font-family: var(--sans); white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .tb-view-toggle:hover:not(:disabled) { background: #3a3a3a; color: #fff; }
    .tb-view-toggle:disabled { opacity: 0.3; cursor: default; }

    @media (max-width: 700px) {
      .toolbar { display: none; }
      .mobile-topbar { display: flex !important; }
      .mobile-bottombar { display: flex !important; }
      .body-wrap { padding-bottom: var(--bottom-h); }
    }
    .mobile-topbar {
      display: none; height: var(--toolbar-h); background: #181818;
      align-items: center; padding: 0 0.75rem; gap: 8px;
      flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .mob-back {
      display: flex; align-items: center; gap: 4px; color: #aaa; font-size: 0.75rem;
      text-decoration: none; flex-shrink: 0; white-space: nowrap;
    }
    .mob-title { color: #ccc; font-size: 0.78rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mob-page { font-size: 0.72rem; color: #888; white-space: nowrap; flex-shrink: 0; }
    .mob-nav { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .mob-btn {
      background: none; border: none; color: #aaa; width: 32px; height: 32px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center;
    }
    .mob-btn:disabled { opacity: 0.3; }
    .mob-btn:active { background: #333; }
    .mobile-bottombar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-h); background: #181818; border-top: 1px solid #2e2e2e;
      align-items: center; justify-content: space-around; z-index: 100; padding: 0 0.5rem;
    }
    .mob-action {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: #aaa; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background 0.1s; font-family: var(--sans);
      flex: 1;
    }
    .mob-action:active, .mob-action.active { background: #2e2e2e; color: #fff; }
    .mob-action span { font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; }

    .zoom-popup {
      display: none; position: fixed; top: calc(var(--toolbar-h) + 4px); right: 170px;
      background: #222; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 10px 14px; z-index: 200; gap: 10px; align-items: center; white-space: nowrap;
    }
    .zoom-popup.open { display: flex; }
    .zoom-popup button {
      background: #333; border: none; color: #ccc; width: 28px; height: 28px;
      border-radius: 4px; cursor: pointer; font-size: 1.1rem; display: flex; align-items: center; justify-content: center;
    }
    .zoom-popup button:hover { background: #444; color: #fff; }
    .zoom-label { font-size: 0.78rem; color: #aaa; min-width: 42px; text-align: center; }
    @media (max-width: 700px) {
      .zoom-popup { top: calc(var(--toolbar-h) + 4px); right: 8px; }
    }

    .tile-overlay {
      display: none; position: fixed; inset: 0; top: var(--toolbar-h);
      background: #1e1e1e; z-index: 150; overflow-y: auto; padding: 1.5rem;
    }
    .tile-overlay.open { display: block; }
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; max-width: 1200px; margin: 0 auto; }
    .tile-item {
      cursor: pointer; border-radius: 4px; overflow: hidden;
      border: 2px solid transparent; transition: border-color 0.15s; background: #2a2a2a;
    }
    .tile-item:hover { border-color: #555; }
    .tile-item.current { border-color: var(--accent); }
    .tile-item img { width: 100%; display: block; }
    .tile-page-num { text-align: center; font-size: 0.62rem; color: #888; padding: 4px 0; background: #222; }

    .body-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
    .search-sidebar {
      width: 0; flex-shrink: 0; background: #1a1a1a;
      border-right: 1px solid #2e2e2e; overflow: hidden;
      transition: width 0.2s ease; display: flex; flex-direction: column; z-index: 90;
    }
    .search-sidebar.open { width: var(--search-w); }
    @media (max-width: 700px) {
      .search-sidebar { position: fixed; top: var(--toolbar-h); bottom: var(--bottom-h); left: 0; width: 0; z-index: 120; }
      .search-sidebar.open { width: min(var(--search-w), 90vw); }
    }
    .search-inner { width: var(--search-w); padding: 12px; display: flex; flex-direction: column; gap: 10px; height: 100%; overflow: hidden; }
    .search-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .search-header span { font-size: 0.72rem; color: #777; letter-spacing: 0.08em; text-transform: uppercase; }
    .search-close { background: none; border: none; color: #555; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
    .search-close:hover { background: #333; color: #ccc; }
    .search-row { display: flex; gap: 6px; flex-shrink: 0; }
    .search-input {
      flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #ddd;
      border-radius: 4px; padding: 7px 10px; font-size: 0.8rem;
      font-family: var(--sans); outline: none; min-width: 0;
    }
    .search-input:focus { border-color: #555; }
    .search-go {
      background: var(--accent); border: none; color: #fff; border-radius: 4px;
      padding: 7px 12px; font-size: 0.76rem; font-family: var(--sans); cursor: pointer; flex-shrink: 0;
    }
    .search-go:hover { background: var(--accent2); }
    .search-status { font-size: 0.7rem; color: #666; flex-shrink: 0; min-height: 16px; }
    .search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
    .sr-item {
      display: flex; align-items: flex-start; gap: 8px; padding: 8px;
      background: #222; border-radius: 4px; cursor: pointer;
      transition: background 0.1s; border: 1px solid transparent; flex-shrink: 0;
    }
    .sr-item:hover { background: #2e2e2e; border-color: #3a3a3a; }
    .sr-item.active-result { border-color: var(--accent); }
    .sr-thumb { width: 32px; height: 44px; object-fit: cover; border-radius: 2px; background: #333; flex-shrink: 0; }
    .sr-info { flex: 1; min-width: 0; }
    .sr-page { font-size: 0.68rem; color: #666; margin-bottom: 3px; }
    .sr-match { font-size: 0.73rem; color: #bbb; line-height: 1.5; word-break: break-word; }
    .sr-match mark { background: rgba(160,20,20,0.5); color: #ff9999; border-radius: 2px; padding: 0 2px; font-style: normal; }

    .main-area { flex: 1; display: flex; overflow: hidden; }
    .stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    #flipbook-container { position: relative; display: none; transform-origin: center center; }

    /* ── PDF scroll view ──────────────────────────────────────────
       Each .pdf-page-wrap is sized in canvas PIXEL dimensions by JS.
       CSS max-width constrains it on mobile; the browser scales
       width:100% canvas + absolute overlays proportionally together.
    ───────────────────────────────────────────────────────────── */
    .pdf-view {
      display: none; flex: 1; overflow-y: auto; overflow-x: hidden;
      flex-direction: column; align-items: center; gap: 16px; padding: 1.5rem 1rem;
    }
    .pdf-view.active { display: flex; }
    .pdf-page-wrap {
      position: relative; flex-shrink: 0;
      /* limit to viewport on mobile; browser scales height proportionally */
      max-width: calc(100vw - 2rem);
      box-shadow: 0 4px 24px rgba(0,0,0,0.5);
    }
    /* canvas fills the wrapper at its natural size, shrinks on mobile via max-width */
    .pdf-page-wrap canvas { display: block; width: 100%; height: auto; }

    /* Text layer — invisible spans for highlight only; never intercept clicks */
    .pdf-text-layer {
      position: absolute; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      overflow: hidden;
    }
    .pdf-text-layer span {
      position: absolute;
      color: transparent;
      white-space: pre;
      transform-origin: 0% 0%;
      pointer-events: none;
    }
    /* Search highlight — darker amber, clearly visible on white page */
    .pdf-text-layer span.hl {
      background: rgba(175, 100, 0, 0.80);
      border-radius: 2px;
    }

    /* Link overlays — percentage-based so they scale with the wrap */
    .pdf-link {
      position: absolute;
      pointer-events: auto;
      cursor: pointer;
      z-index: 5;
      background: rgba(70, 130, 255, 0.07);
      border: 1px solid rgba(70, 130, 255, 0.28);
      border-radius: 2px;
      transition: background 0.12s;
    }
    .pdf-link:hover { background: rgba(70, 130, 255, 0.20); }

    /* Flipbook highlight box */
    .hl-box {
      position: absolute;
      background: rgba(175, 100, 0, 0.80);
      pointer-events: none; border-radius: 2px; z-index: 6;
      box-shadow: 0 0 0 1.5px rgba(120, 60, 0, 0.9);
      animation: hl-fade 5s forwards;
    }
    @keyframes hl-fade { 0%,75%{opacity:1} 100%{opacity:0} }

    .loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; background: #2a2a2a; z-index: 20; }
    .loading.hidden { display: none; }
    .load-title { color: #ccc; font-size: 0.88rem; text-align: center; padding: 0 2rem; }
    .progress-track { width: 240px; height: 3px; background: #3a3a3a; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.2s ease; }
    .load-status { font-size: 0.72rem; color: #666; }
    .error { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; background: #2a2a2a; z-index: 20; }
    .error.show { display: flex; }
    .error h2 { color: #ddd; font-size: 1rem; font-weight: 500; }
    .error p { color: #777; font-size: 0.82rem; max-width: 340px; line-height: 1.6; }
    .error a { color: #c06060; font-size: 0.82rem; }
    :fullscreen .toolbar, :-webkit-full-screen .toolbar { z-index: 100; }
  </style>
</head>
<body>

<div class="toolbar">
  <a class="tb-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Publications
  </a>
  <span class="tb-title" id="doc-title">Loading…</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-first" disabled onclick="goFirst()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg>
  </button>
  <button class="tb-btn" id="btn-prev" disabled onclick="goPrev()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
  </button>
  <span class="tb-page" id="page-indicator">— / —</span>
  <button class="tb-btn" id="btn-next" disabled onclick="goNext()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
  </button>
  <button class="tb-btn" id="btn-last" disabled onclick="goLast()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-zoom" disabled onclick="toggleZoom()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg>
  </button>
  <button class="tb-btn" id="btn-tiles" disabled onclick="toggleTiles()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
  </button>
  <button class="tb-btn" id="btn-search" disabled onclick="toggleSearch()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
  </button>
  <button class="tb-btn" id="btn-fs" disabled onclick="toggleFullscreen()">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
  </button>
  <div class="tb-sep"></div>
  <button class="tb-view-toggle" id="btn-view-toggle" disabled onclick="toggleViewMode()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF View
  </button>
  <div class="tb-sep"></div>
  <a class="tb-download" id="dl-btn" href="#" download>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </a>
</div>

<div class="mobile-topbar">
  <a class="mob-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    Back
  </a>
  <span class="mob-title" id="mob-title">Loading…</span>
  <span class="mob-page" id="mob-page">—/—</span>
  <div class="mob-nav">
    <button class="mob-btn" id="mob-prev" disabled onclick="goPrev()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="mob-btn" id="mob-next" disabled onclick="goNext()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
  </div>
</div>

<div class="zoom-popup" id="zoom-popup">
  <button onclick="changeZoom(-0.15)">−</button>
  <span class="zoom-label" id="zoom-label">100%</span>
  <button onclick="changeZoom(0.15)">+</button>
  <button onclick="resetZoom()" style="font-size:0.7rem;width:auto;padding:0 8px;">Reset</button>
</div>

<div class="tile-overlay" id="tile-overlay">
  <div class="tile-grid" id="tile-grid"></div>
</div>

<div class="body-wrap">
  <div class="search-sidebar" id="search-sidebar">
    <div class="search-inner">
      <div class="search-header">
        <span>Search</span>
        <button class="search-close" onclick="toggleSearch()">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      <div class="search-row">
        <input class="search-input" id="search-input" type="text" placeholder="Page number or keyword…" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="search-go" onclick="doSearch()">Go</button>
      </div>
      <div class="search-status" id="search-status">Enter a page number or keyword.</div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="stage" id="stage">
      <div class="loading" id="loading">
        <span class="load-title" id="load-title">Preparing document…</span>
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="load-status" id="load-status">Starting…</span>
      </div>
      <div class="error" id="error">
        <h2>Could not load document</h2>
        <p id="error-msg">Check the file is in the pdfs/ folder and publications.json is correct.</p>
        <a href="index.html">← Back to publications</a>
      </div>
      <div id="flipbook-container"><div id="flipbook"></div></div>
    </div>
    <div class="pdf-view" id="pdf-view"></div>
  </div>
</div>

<div class="mobile-bottombar" id="mobile-bottombar">
  <button class="mob-action" id="mob-tiles" onclick="toggleTiles()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Pages</span>
  </button>
  <button class="mob-action" id="mob-search-btn" onclick="toggleSearch()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="mob-action" id="mob-view-btn" onclick="toggleViewMode()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="mob-view-label">PDF View</span>
  </button>
  <button class="mob-action" id="mob-fs-btn" onclick="toggleFullscreen()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>
    <span>Fullscreen</span>
  </button>
  <a class="mob-action" id="mob-dl" href="#" download>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>Download</span>
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const params   = new URLSearchParams(window.location.search);
const pdfFile  = params.get('file')  || '';
const pdfTitle = params.get('title') || 'Document';
const isMobile = window.innerWidth <= 700;

document.title = pdfTitle + ' — DoMS Publications';
['doc-title','mob-title','load-title'].forEach(id => {
  const el = document.getElementById(id); if (el) el.textContent = pdfTitle;
});
document.getElementById('dl-btn').href     = pdfFile;
document.getElementById('dl-btn').download = pdfFile.split('/').pop();
const mobDl = document.getElementById('mob-dl');
mobDl.href = pdfFile; mobDl.download = pdfFile.split('/').pop();

// ── State ──────────────────────────────────────────────────────
let pageFlip     = null;
let pdfDocRef    = null;
let totalPages   = 0;
let currentPage  = 1;
let zoomLevel    = 1.0;
let viewMode     = 'flipbook';
let allDataUrls  = [];
let thumbUrls    = [];
let pdfPageWraps = [];   // 1-indexed: { el, tl }
let pdfViewBuilt = false;
let dispW = 0, dispH = 0;

// Scale for flipbook image rendering and PDF view rendering
// Both use the same high-quality scale so switching modes looks identical.
const RENDER_SCALE = 2.5;
const THUMB_SCALE  = 0.28;

// ── Render one page to canvas ───────────────────────────────────
async function renderPage(pdfDoc, pageNum, scale) {
  const page = await pdfDoc.getPage(pageNum);
  const vp   = page.getViewport({ scale });
  const c    = document.createElement('canvas');
  c.width    = Math.floor(vp.width);
  c.height   = Math.floor(vp.height);
  const ctx  = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return { canvas: c, page, viewport: vp };
}

// ── Load flipbook ───────────────────────────────────────────────
async function loadFlipbook(pdfDoc) {
  totalPages = pdfDoc.numPages;
  setProgress(3, 'Calculating layout…');

  const { canvas: fc } = await renderPage(pdfDoc, 1, RENDER_SCALE);
  const srcW = fc.width, srcH = fc.height;
  const stageH = window.innerHeight - (isMobile ? 52 + 56 : 52) - 20;
  const stageW = window.innerWidth  - 20;
  const dScale = isMobile
    ? Math.min(stageH / srcH, stageW / srcW, 1)
    : Math.min(stageH / srcH, (stageW / 2) / srcW, 1);
  dispW = Math.floor(srcW * dScale);
  dispH = Math.floor(srcH * dScale);

  allDataUrls = [fc.toDataURL('image/png')];
  const { canvas: ft } = await renderPage(pdfDoc, 1, THUMB_SCALE);
  thumbUrls = [ft.toDataURL('image/jpeg', 0.75)];

  for (let i = 2; i <= totalPages; i++) {
    setProgress(Math.round((i / totalPages) * 88), `Rendering page ${i} of ${totalPages}…`);
    const { canvas: full  } = await renderPage(pdfDoc, i, RENDER_SCALE);
    allDataUrls.push(full.toDataURL('image/png'));
    const { canvas: thumb } = await renderPage(pdfDoc, i, THUMB_SCALE);
    thumbUrls.push(thumb.toDataURL('image/jpeg', 0.75));
  }

  setProgress(92, 'Building flipbook…');
  const container = document.getElementById('flipbook-container');
  const flipEl    = document.getElementById('flipbook');
  flipEl.innerHTML = '';
  const containerW = isMobile ? dispW : dispW * 2;
  flipEl.style.cssText    = `width:${containerW}px;height:${dispH}px;`;
  container.style.cssText = `width:${containerW}px;height:${dispH}px;transform-origin:center center;`;

  allDataUrls.forEach((url, idx) => {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.pageNum = idx + 1;
    div.style.cssText = `width:${dispW}px;height:${dispH}px;overflow:hidden;background:#fff;position:relative;`;
    const img = document.createElement('img');
    img.src = url;
    img.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;`;
    div.appendChild(img);
    flipEl.appendChild(div);
  });

  setProgress(96, 'Initialising…');
  pageFlip = new St.PageFlip(container, {
    width: dispW, height: dispH, size: 'fixed',
    showCover: true, usePortrait: isMobile,
    mobileScrollSupport: false, flippingTime: 600, maxShadowOpacity: 0.5,
  });
  pageFlip.loadFromHTML(flipEl.querySelectorAll('.page'));
  pageFlip.on('flip', e => { currentPage = e.data + 1; updateControls(); });

  setProgress(100, 'Ready');
  document.getElementById('loading').classList.add('hidden');
  container.style.display = 'block';
  enableControls(); updateControls(); buildTileGrid();
}

// ── Controls ────────────────────────────────────────────────────
function setProgress(pct, msg) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('load-status').textContent  = msg;
}
function showError(msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}
function enableControls() {
  ['btn-first','btn-prev','btn-next','btn-last','btn-zoom','btn-tiles','btn-search','btn-fs','btn-view-toggle']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
  ['mob-prev','mob-next','mob-tiles','mob-search-btn','mob-view-btn','mob-fs-btn']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
}
function updateControls() {
  const txt = `${currentPage} / ${totalPages}`;
  const e1 = document.getElementById('page-indicator'), e2 = document.getElementById('mob-page');
  if (e1) e1.textContent = txt;
  if (e2) e2.textContent = txt;
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-prev').disabled  = currentPage <= 1;
  document.getElementById('btn-next').disabled  = currentPage >= totalPages;
  document.getElementById('btn-last').disabled  = currentPage >= totalPages;
  const mp = document.getElementById('mob-prev'), mn = document.getElementById('mob-next');
  if (mp) mp.disabled = currentPage <= 1;
  if (mn) mn.disabled = currentPage >= totalPages;
  document.querySelectorAll('.tile-item').forEach((t,i) =>
    t.classList.toggle('current', i + 1 === currentPage));
}
function goFirst() { pageFlip && pageFlip.flip(0); }
function goLast()  { pageFlip && pageFlip.flip(totalPages - 1); }
function goPrev()  { pageFlip && pageFlip.flipPrev(); }
function goNext()  { pageFlip && pageFlip.flipNext(); }
function goToPage(n, query) {
  if (viewMode === 'flipbook') {
    document.getElementById('tile-overlay').classList.remove('open');
    document.getElementById('btn-tiles').classList.remove('active');
    if (pageFlip) pageFlip.flip(n - 1);
    if (query) setTimeout(() => highlightFlipbook(n, query), 900);
  } else {
    scrollToPdfPage(n);
    if (query) setTimeout(() => highlightPdfView(n, query), 150);
  }
}

// ── Zoom ────────────────────────────────────────────────────────
function toggleZoom() {
  const p = document.getElementById('zoom-popup');
  p.classList.toggle('open');
  document.getElementById('btn-zoom').classList.toggle('active', p.classList.contains('open'));
}
function applyZoom() {
  document.getElementById('flipbook-container').style.transform = `scale(${zoomLevel})`;
  document.getElementById('zoom-label').textContent = Math.round(zoomLevel * 100) + '%';
}
function changeZoom(d) {
  zoomLevel = Math.max(0.3, Math.min(2.5, Math.round((zoomLevel + d) * 10) / 10));
  applyZoom();
}
function resetZoom() { zoomLevel = 1.0; applyZoom(); }

// ── Fullscreen ──────────────────────────────────────────────────
const FS_ENTER = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const FS_EXIT  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange', () => {
  const isFS = !!document.fullscreenElement;
  document.getElementById('btn-fs').innerHTML = isFS ? FS_EXIT : FS_ENTER;
});

// ── Tiles ───────────────────────────────────────────────────────
function buildTileGrid() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  thumbUrls.forEach((url, i) => {
    const item = document.createElement('div');
    item.className = 'tile-item' + (i === 0 ? ' current' : '');
    item.onclick = () => goToPage(i + 1);
    const img = document.createElement('img'); img.src = url;
    const num = document.createElement('div');
    num.className = 'tile-page-num'; num.textContent = 'Page ' + (i + 1);
    item.appendChild(img); item.appendChild(num);
    grid.appendChild(item);
  });
}
function toggleTiles() {
  const o = document.getElementById('tile-overlay');
  o.classList.toggle('open');
  document.getElementById('btn-tiles').classList.toggle('active', o.classList.contains('open'));
  document.getElementById('mob-tiles').classList.toggle('active', o.classList.contains('open'));
  if (o.classList.contains('open')) {
    const cur = o.querySelector('.current'); if (cur) cur.scrollIntoView({ block: 'center' });
  }
}

// ── View mode toggle ────────────────────────────────────────────
async function toggleViewMode() {
  if (viewMode === 'flipbook') {
    viewMode = 'pdf';
    document.getElementById('stage').style.display = 'none';
    const pdfViewEl = document.getElementById('pdf-view');
    pdfViewEl.classList.add('active');

    if (!pdfViewBuilt && pdfDocRef) {
      pdfViewEl.innerHTML = ''; pdfPageWraps = [];
      document.getElementById('loading').classList.remove('hidden');
      for (let i = 1; i <= totalPages; i++) {
        setProgress(Math.round((i / totalPages) * 100), `Building page ${i} of ${totalPages}…`);
        const pw = await buildPageWrap(pdfDocRef, i);
        pdfViewEl.appendChild(pw.el);
        pdfPageWraps[i] = pw;
      }
      pdfViewBuilt = true;
      document.getElementById('loading').classList.add('hidden');
    }
    const lbl = 'Flipbook';
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg> ${lbl}`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = lbl;
    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = true);
  } else {
    viewMode = 'flipbook';
    document.getElementById('pdf-view').classList.remove('active');
    document.getElementById('stage').style.display = '';
    const lbl = 'PDF View';
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${lbl}`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = lbl;
    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = false);
    updateControls();
  }
}

// ── Build one PDF page wrap ─────────────────────────────────────
/*
  Design:
  - Render canvas at RENDER_SCALE (same scale as flipbook = full quality).
  - Wrap is sized to canvas.width × canvas.height in CSS px.
    CSS max-width on the wrap caps it at (100vw - 2rem); browser scales
    proportionally so canvas + text layer + links all shrink together.
  - Text spans: positioned using the PDF item transform, scaled to canvas px.
    Use item.transform [a,b,c,d,e,f]:
      canvasX = e * RENDER_SCALE
      canvasY = canvasH - (f * RENDER_SCALE) - (fontSize * RENDER_SCALE)
    These are absolute canvas-pixel values. Because canvas fills wrap at
    width:100%/height:auto, any CSS scaling is uniform, so percentage values
    would also work — but absolute px is simpler and correct here.
  - Link rects: use viewport.convertToViewportRectangle() to convert PDF
    annotation rect from user-space → canvas pixel space. Expressed as % of
    wrap so they always sit over the correct spot after CSS scaling.
*/
async function buildPageWrap(pdfDoc, pageNum) {
  const { canvas, page, viewport } = await renderPage(pdfDoc, pageNum, RENDER_SCALE);
  const W = canvas.width;
  const H = canvas.height;

  const wrap = document.createElement('div');
  wrap.className = 'pdf-page-wrap';
  wrap.dataset.pageNum = pageNum;
  wrap.style.width  = W + 'px';
  wrap.style.height = H + 'px';
  wrap.appendChild(canvas);

  // ── Text layer ──────────────────────────────────────────────
  const content = await page.getTextContent();
  const tl = document.createElement('div');
  tl.className = 'pdf-text-layer';

  content.items.forEach(item => {
    if (!item.str || !item.str.trim()) return;
    const [a, b, , , e, f] = item.transform;
    const fontSize = Math.sqrt(a * a + b * b); // user-space units
    if (fontSize < 0.5) return;

    // Scale to canvas pixels
    const cx = e  * RENDER_SCALE;
    const cy = H - (f * RENDER_SCALE) - (fontSize * RENDER_SCALE);
    const cw = Math.abs(item.width) * RENDER_SCALE;
    const ch = fontSize * RENDER_SCALE * 1.2;

    // scaleX compresses/stretches text to match actual glyph widths
    const naturalW = fontSize * RENDER_SCALE * item.str.length;
    const scaleX   = naturalW > 0 ? (cw / naturalW) : 1;

    const span = document.createElement('span');
    span.textContent = item.str;
    span.style.cssText = `left:${cx.toFixed(1)}px;top:${cy.toFixed(1)}px;` +
      `font-size:${(fontSize * RENDER_SCALE).toFixed(1)}px;` +
      `width:${(cw || ch).toFixed(1)}px;` +
      `transform:scaleX(${scaleX.toFixed(4)});`;
    tl.appendChild(span);
  });
  wrap.appendChild(tl);

  // ── Link overlays ────────────────────────────────────────────
  // viewport.convertToViewportRectangle maps [x1,y1,x2,y2] from PDF user-space
  // to the canvas coordinate system (pixels, Y flipped). Express as % of wrap
  // so the overlay stays aligned when CSS scales the wrap for mobile.
  try {
    const anns = await page.getAnnotations();
    anns.forEach(ann => {
      if (ann.subtype !== 'Link') return;
      const hasUrl  = ann.url && ann.url.trim();
      const hasDest = ann.dest != null;
      const hasAct  = ann.action != null;
      if (!hasUrl && !hasDest && !hasAct) return;

      // Convert annotation rect to canvas pixels
      const vr = viewport.convertToViewportRectangle(ann.rect);
      const x1 = Math.min(vr[0], vr[2]), y1 = Math.min(vr[1], vr[3]);
      const x2 = Math.max(vr[0], vr[2]), y2 = Math.max(vr[1], vr[3]);

      const a = document.createElement('a');
      a.className = 'pdf-link';
      // Use % so the overlay scales with the CSS-scaled wrap
      a.style.left   = ((x1 / W) * 100).toFixed(3) + '%';
      a.style.top    = ((y1 / H) * 100).toFixed(3) + '%';
      a.style.width  = (((x2 - x1) / W) * 100).toFixed(3) + '%';
      a.style.height = (((y2 - y1) / H) * 100).toFixed(3) + '%';

      if (hasUrl) {
        a.href = ann.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = ann.url;
      } else {
        a.href = '#';
        const dest = ann.dest || (ann.action && ann.action.dest);
        a.addEventListener('click', async ev => {
          ev.preventDefault();
          if (!dest) return;
          try {
            const arr = typeof dest === 'string' ? await pdfDocRef.getDestination(dest) : dest;
            if (arr && arr[0]) scrollToPdfPage((await pdfDocRef.getPageIndex(arr[0])) + 1);
          } catch(err) { console.warn('Internal link:', err); }
        });
      }
      wrap.appendChild(a);  // after tl — sits on top in DOM stacking
    });
  } catch(e) { /* annotations optional */ }

  return { el: wrap, tl };
}

// ── PDF view scroll ─────────────────────────────────────────────
function scrollToPdfPage(n) {
  if (!pdfPageWraps[n]) return;
  pdfPageWraps[n].el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  currentPage = n; updateControls();
}

// ── Search ──────────────────────────────────────────────────────
function toggleSearch() {
  const s = document.getElementById('search-sidebar');
  s.classList.toggle('open');
  document.getElementById('btn-search').classList.toggle('active', s.classList.contains('open'));
  document.getElementById('mob-search-btn').classList.toggle('active', s.classList.contains('open'));
  if (s.classList.contains('open'))
    setTimeout(() => document.getElementById('search-input').focus(), 210);
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const statusEl = document.getElementById('search-status');
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = ''; statusEl.textContent = 'Searching…';

  const pageNum = parseInt(query, 10);
  if (!isNaN(pageNum) && String(pageNum) === query && pageNum >= 1 && pageNum <= totalPages) {
    statusEl.textContent = `Jumping to page ${pageNum}`; goToPage(pageNum); return;
  }
  if (!pdfDocRef) { statusEl.textContent = 'PDF not ready.'; return; }

  const matches = [];
  const q = query.toLowerCase();
  for (let i = 1; i <= totalPages; i++) {
    try {
      const page = await pdfDocRef.getPage(i);
      const content = await page.getTextContent();
      const text = content.items.map(it => it.str).join(' ');
      if (text.toLowerCase().includes(q)) {
        const idx = text.toLowerCase().indexOf(q);
        matches.push({ page: i, snippet: text.substring(Math.max(0, idx - 40), idx + 80) });
      }
    } catch(e) { /* skip */ }
  }

  if (!matches.length) { statusEl.textContent = `No results for "${query}"`; return; }
  statusEl.textContent = `${matches.length} page${matches.length > 1 ? 's' : ''} found`;

  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  matches.forEach(m => {
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.onclick = () => {
      document.querySelectorAll('.sr-item').forEach(el => el.classList.remove('active-result'));
      item.classList.add('active-result'); goToPage(m.page, query);
    };
    item.innerHTML = `
      <img class="sr-thumb" src="${thumbUrls[m.page-1]||''}" alt="Page ${m.page}"/>
      <div class="sr-info">
        <div class="sr-page">Page ${m.page}</div>
        <div class="sr-match">…${m.snippet.replace(re, s => `<mark>${s}</mark>`)}…</div>
      </div>`;
    resultsEl.appendChild(item);
  });
}

// ── Highlight: flipbook ─────────────────────────────────────────
/*
  Flipbook images are rendered at RENDER_SCALE then CSS-shrunk to dispW×dispH.
  To overlay a highlight box we need coordinates in display pixels.

  PDF text item transform [a,b,c,d,e,f] gives:
    e, f = glyph origin (baseline) in PDF user-space, Y from bottom
    fontSize (user-space) = sqrt(a²+b²)

  Steps:
    1. Get user-space viewport (scale=1): vp1.width, vp1.height
    2. Compute display-pixel ratios:
         rx = dispW / vp1.width
         ry = dispH / vp1.height
    3. left = e * rx
       top  = (vp1.height - f - fontSize) * ry   ← Y-flip + shift up by font height
*/
async function highlightFlipbook(pageNum, query) {
  if (!pdfDocRef || !query) return;
  document.querySelectorAll('#flipbook .hl-box').forEach(el => el.remove());
  try {
    const page    = await pdfDocRef.getPage(pageNum);
    const content = await page.getTextContent();
    const vp1     = page.getViewport({ scale: 1 });
    const q       = query.toLowerCase();
    const pageDiv = document.querySelector(`#flipbook .page[data-page-num="${pageNum}"]`);
    if (!pageDiv) return;

    const rx = dispW / vp1.width;
    const ry = dispH / vp1.height;
    let count = 0;

    content.items.forEach(item => {
      if (count >= 20 || !item.str.toLowerCase().includes(q)) return;
      const [a, b, , , e, f] = item.transform;
      const fontSize = Math.sqrt(a * a + b * b);   // user-space units
      if (fontSize < 0.5) return;

      const left   = e * rx;
      const top    = (vp1.height - f - fontSize) * ry;
      const width  = Math.abs(item.width) * rx || fontSize * rx * item.str.length * 0.6;
      const height = fontSize * ry * 1.2;

      // Skip if outside page bounds
      if (left + width < 0 || top + height < 0 || left > dispW || top > dispH) return;

      const box = document.createElement('div');
      box.className = 'hl-box';
      box.style.left   = Math.max(0, left).toFixed(1)   + 'px';
      box.style.top    = Math.max(0, top).toFixed(1)    + 'px';
      box.style.width  = Math.max(4, width).toFixed(1)  + 'px';
      box.style.height = Math.max(6, height).toFixed(1) + 'px';
      pageDiv.appendChild(box);
      count++;
    });
  } catch(e) { console.warn('Flipbook highlight:', e); }
}

// ── Highlight: PDF view ─────────────────────────────────────────
/*
  Text spans in the PDF view are positioned at canvas-pixel coordinates
  matching the PDF text item positions. To highlight we just add class .hl.
*/
function highlightPdfView(pageNum, query) {
  if (!query || !pdfPageWraps[pageNum]) return;
  document.querySelectorAll('.pdf-text-layer span.hl').forEach(el => el.classList.remove('hl'));
  const q = query.toLowerCase();
  const tl = pdfPageWraps[pageNum].tl;
  if (!tl) return;
  let count = 0;
  tl.querySelectorAll('span').forEach(span => {
    if (count < 20 && span.textContent.toLowerCase().includes(q)) {
      span.classList.add('hl'); count++;
    }
  });
  const first = tl.querySelector('span.hl');
  if (first) first.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── Keyboard ────────────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { if (viewMode === 'flipbook') goNext(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { if (viewMode === 'flipbook') goPrev(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === '+' || e.key === '=') changeZoom(0.15);
  if (e.key === '-') changeZoom(-0.15);
  if (e.key === '0') resetZoom();
  if (e.key === 'Escape') {
    document.getElementById('tile-overlay').classList.remove('open');
    document.getElementById('zoom-popup').classList.remove('open');
    if (document.fullscreenElement) document.exitFullscreen();
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('#zoom-popup') && !e.target.closest('#btn-zoom'))
    document.getElementById('zoom-popup').classList.remove('open');
});

// ── Boot ────────────────────────────────────────────────────────
async function boot() {
  if (!pdfFile) { showError('No PDF file specified.'); return; }
  try {
    setProgress(2, 'Fetching document…');
    const url = new URL(pdfFile, window.location.href).href;
    const pdfDoc = await pdfjsLib.getDocument({
      url, withCredentials: false,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
    }).promise;
    pdfDocRef = pdfDoc;
    await loadFlipbook(pdfDoc);
  } catch(e) {
    console.error('BOOT ERROR:', e);
    showError(`Could not load "${pdfFile}". Make sure the file exists in the pdfs/ folder.`);
  }
}
boot();

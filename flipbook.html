<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
  <title>Reader — DoMS Publications</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --accent: #8b1a1a; --accent2: #a02020;
      --toolbar-h: 52px; --bottom-h: 56px; --search-w: 300px;
      --sans: 'DM Sans', system-ui, sans-serif;
    }
    html, body { height: 100%; overflow: hidden; background: #2a2a2a; font-family: var(--sans); }
    body { display: flex; flex-direction: column; }

    /* ── DESKTOP TOOLBAR ── */
    .toolbar {
      height: var(--toolbar-h); background: #181818;
      display: flex; align-items: center; padding: 0 0.75rem;
      gap: 4px; flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .tb-back {
      display: flex; align-items: center; gap: 5px; color: #aaa; font-size: 0.78rem;
      text-decoration: none; padding: 6px 10px 6px 0; border-right: 1px solid #2e2e2e;
      margin-right: 4px; white-space: nowrap; transition: color 0.15s; flex-shrink: 0;
    }
    .tb-back:hover { color: #fff; }
    .tb-title { color: #ccc; font-size: 0.82rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .tb-sep { width: 1px; height: 22px; background: #2e2e2e; flex-shrink: 0; margin: 0 2px; }
    .tb-btn {
      background: none; border: none; color: #aaa; width: 32px; height: 32px;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      justify-content: center; transition: background 0.15s, color 0.15s; flex-shrink: 0;
    }
    .tb-btn:hover:not(:disabled) { background: #2e2e2e; color: #fff; }
    .tb-btn:disabled { opacity: 0.3; cursor: default; }
    .tb-btn.active { background: #333; color: #fff; }
    .tb-page { font-size: 0.73rem; color: #888; min-width: 60px; text-align: center; font-variant-numeric: tabular-nums; flex-shrink: 0; }
    .tb-download {
      display: flex; align-items: center; gap: 4px; background: var(--accent);
      color: #fff; border: none; border-radius: 4px; padding: 5px 10px;
      font-size: 0.72rem; font-family: var(--sans); cursor: pointer;
      transition: opacity 0.15s; flex-shrink: 0; text-decoration: none; white-space: nowrap;
    }
    .tb-download:hover { opacity: 0.85; }
    .tb-view-toggle {
      background: #2e2e2e; border: 1px solid #3a3a3a; color: #ccc;
      border-radius: 4px; cursor: pointer; display: flex; align-items: center;
      gap: 4px; padding: 0 8px; height: 28px; font-size: 0.7rem;
      font-family: var(--sans); white-space: nowrap; transition: background 0.15s; flex-shrink: 0;
    }
    .tb-view-toggle:hover:not(:disabled) { background: #3a3a3a; color: #fff; }
    .tb-view-toggle:disabled { opacity: 0.3; cursor: default; }

    /* ── MOBILE ── */
    @media (max-width: 700px) {
      .toolbar { display: none; }
      .mobile-topbar { display: flex !important; }
      .mobile-bottombar { display: flex !important; }
      .body-wrap { padding-bottom: var(--bottom-h); }
    }
    .mobile-topbar {
      display: none; height: var(--toolbar-h); background: #181818;
      align-items: center; padding: 0 0.75rem; gap: 8px;
      flex-shrink: 0; border-bottom: 1px solid #2e2e2e; z-index: 100;
    }
    .mob-back { display: flex; align-items: center; gap: 4px; color: #aaa; font-size: 0.75rem; text-decoration: none; flex-shrink: 0; white-space: nowrap; }
    .mob-title { color: #ccc; font-size: 0.78rem; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .mob-page { font-size: 0.72rem; color: #888; white-space: nowrap; flex-shrink: 0; }
    .mob-nav { display: flex; align-items: center; gap: 2px; flex-shrink: 0; }
    .mob-btn { background: none; border: none; color: #aaa; width: 32px; height: 32px; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mob-btn:disabled { opacity: 0.3; }
    .mob-btn:active { background: #333; }
    .mobile-bottombar {
      display: none; position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--bottom-h); background: #181818; border-top: 1px solid #2e2e2e;
      align-items: center; justify-content: space-around; z-index: 100; padding: 0 0.5rem;
    }
    .mob-action {
      display: flex; flex-direction: column; align-items: center; gap: 3px;
      background: none; border: none; color: #aaa; cursor: pointer;
      padding: 4px 8px; border-radius: 6px; transition: background 0.1s; font-family: var(--sans); flex: 1;
    }
    .mob-action:active, .mob-action.active { background: #2e2e2e; color: #fff; }
    .mob-action span { font-size: 0.6rem; letter-spacing: 0.04em; text-transform: uppercase; }

    /* ── ZOOM POPUP ── */
    .zoom-popup {
      display: none; position: fixed; top: calc(var(--toolbar-h) + 4px); right: 170px;
      background: #222; border: 1px solid #3a3a3a; border-radius: 6px;
      padding: 8px 12px; z-index: 200; gap: 6px; align-items: center; white-space: nowrap;
    }
    .zoom-popup.open { display: flex; }
    .zoom-popup button {
      background: #333; border: none; color: #ccc; height: 28px;
      border-radius: 4px; cursor: pointer; font-size: 1rem;
      display: flex; align-items: center; justify-content: center; padding: 0 8px;
    }
    .zoom-popup button:hover { background: #444; color: #fff; }
    .zoom-label { font-size: 0.78rem; color: #aaa; min-width: 38px; text-align: center; }
    .zoom-divider { width: 1px; height: 20px; background: #3a3a3a; }
    .zoom-fit-btn { font-size: 0.68rem !important; background: #2a2a2a !important; border: 1px solid #3a3a3a !important; }
    .zoom-fit-btn.active-fit { background: #444 !important; color: #fff !important; }
    @media (max-width: 700px) { .zoom-popup { right: 8px; max-width: calc(100vw - 16px); } }

    /* ── TILE OVERLAY ── */
    .tile-overlay { display: none; position: fixed; inset: 0; top: var(--toolbar-h); background: #1e1e1e; z-index: 150; overflow-y: auto; padding: 1.5rem; }
    .tile-overlay.open { display: block; }
    .tile-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 10px; max-width: 1200px; margin: 0 auto; }
    .tile-item { cursor: pointer; border-radius: 4px; overflow: hidden; border: 2px solid transparent; transition: border-color 0.15s; background: #2a2a2a; }
    .tile-item:hover { border-color: #555; }
    .tile-item.current { border-color: var(--accent); }
    .tile-item img { width: 100%; display: block; }
    .tile-page-num { text-align: center; font-size: 0.62rem; color: #888; padding: 4px 0; background: #222; }

    /* ── BODY + SEARCH ── */
    .body-wrap { flex: 1; display: flex; overflow: hidden; position: relative; }
    .search-sidebar { width: 0; flex-shrink: 0; background: #1a1a1a; border-right: 1px solid #2e2e2e; overflow: hidden; transition: width 0.2s ease; display: flex; flex-direction: column; z-index: 90; }
    .search-sidebar.open { width: var(--search-w); }
    @media (max-width: 700px) {
      .search-sidebar { position: fixed; top: var(--toolbar-h); bottom: var(--bottom-h); left: 0; width: 0; z-index: 120; }
      .search-sidebar.open { width: min(var(--search-w), 90vw); }
    }
    .search-inner { width: var(--search-w); padding: 12px; display: flex; flex-direction: column; gap: 10px; height: 100%; overflow: hidden; }
    .search-header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .search-header span { font-size: 0.72rem; color: #777; letter-spacing: 0.08em; text-transform: uppercase; }
    .search-close { background: none; border: none; color: #555; cursor: pointer; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; border-radius: 3px; }
    .search-close:hover { background: #333; color: #ccc; }
    .search-row { display: flex; gap: 6px; flex-shrink: 0; }
    .search-input { flex: 1; background: #2a2a2a; border: 1px solid #3a3a3a; color: #ddd; border-radius: 4px; padding: 7px 10px; font-size: 0.8rem; font-family: var(--sans); outline: none; min-width: 0; }
    .search-input:focus { border-color: #555; }
    .search-go { background: var(--accent); border: none; color: #fff; border-radius: 4px; padding: 7px 12px; font-size: 0.76rem; font-family: var(--sans); cursor: pointer; flex-shrink: 0; }
    .search-go:hover { background: var(--accent2); }
    .search-status { font-size: 0.7rem; color: #666; flex-shrink: 0; min-height: 16px; }
    .search-results { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 5px; }
    .sr-item { display: flex; align-items: flex-start; gap: 8px; padding: 8px; background: #222; border-radius: 4px; cursor: pointer; transition: background 0.1s; border: 1px solid transparent; flex-shrink: 0; }
    .sr-item:hover { background: #2e2e2e; border-color: #3a3a3a; }
    .sr-item.active-result { border-color: var(--accent); }
    .sr-thumb { width: 32px; height: 44px; object-fit: cover; border-radius: 2px; background: #333; flex-shrink: 0; }
    .sr-info { flex: 1; min-width: 0; }
    .sr-page { font-size: 0.68rem; color: #666; margin-bottom: 3px; }
    .sr-match { font-size: 0.73rem; color: #bbb; line-height: 1.5; word-break: break-word; }
    .sr-match mark { background: rgba(160,20,20,0.5); color: #ff9999; border-radius: 2px; padding: 0 2px; font-style: normal; }

    /* ── STAGE ── */
    .main-area { flex: 1; display: flex; overflow: hidden; }
    .stage { flex: 1; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    #flipbook-container { position: relative; display: none; transform-origin: center center; }

    /* Placeholder for unrendered flipbook pages */
    .page-placeholder {
      display: flex; align-items: center; justify-content: center;
      background: #f5f5f5; color: #ccc; font-size: 0.8rem;
    }

    /* ── PDF VIEW ── */
    .pdf-view { display: none; flex: 1; overflow: auto; }
    .pdf-view.active { display: block; }
    .pdf-view-inner { display: flex; flex-direction: column; align-items: center; gap: 0; padding: 1rem; transform-origin: top center; }

    /* Lazy placeholder in PDF view */
    .pdf-page-wrap { position: relative; flex-shrink: 0; margin-bottom: 8px; box-shadow: 0 4px 20px rgba(0,0,0,0.55); background: #fff; }
    .pdf-page-wrap canvas { display: block; width: 100%; height: auto; }
    .pdf-page-placeholder { background: #1e1e1e; display: flex; align-items: center; justify-content: center; }
    .pdf-page-placeholder::after { content: ''; width: 24px; height: 24px; border: 2px solid #444; border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Highlight + links */
    .hl-mark { position: absolute; pointer-events: none; background: rgba(255,180,0,0.55); border: 2px solid rgba(200,120,0,0.85); border-radius: 2px; z-index: 4; }
    .pdf-link { position: absolute; pointer-events: auto; cursor: pointer; z-index: 5; background: rgba(70,130,255,0.06); border: 1px solid rgba(70,130,255,0.25); border-radius: 2px; transition: background 0.12s; }
    .pdf-link:hover { background: rgba(70,130,255,0.18); }
    .hl-box { position: absolute; pointer-events: none; border-radius: 2px; z-index: 6; background: rgba(255,180,0,0.55); border: 2px solid rgba(200,120,0,0.85); animation: hl-fade 5s forwards; }
    @keyframes hl-fade { 0%,70%{opacity:1} 100%{opacity:0} }

    /* PDF side nav (mobile, PDF view) */
    .pdf-side-nav { display: none; position: fixed; top: 50%; transform: translateY(-50%); z-index: 80; background: rgba(0,0,0,0.45); border: none; color: #ddd; width: 32px; height: 64px; border-radius: 4px; cursor: pointer; align-items: center; justify-content: center; backdrop-filter: blur(4px); }
    .pdf-side-nav:disabled { opacity: 0.25; cursor: default; }
    .pdf-side-nav.left { left: 4px; }
    .pdf-side-nav.right { right: 4px; }
    @media (max-width: 700px) { .pdf-side-nav { display: flex; } }

    /* Loading / Error */
    .loading { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 1.25rem; background: #2a2a2a; z-index: 20; }
    .loading.hidden { display: none; }
    .load-title { color: #ccc; font-size: 0.88rem; text-align: center; padding: 0 2rem; }
    .progress-track { width: 240px; height: 3px; background: #3a3a3a; border-radius: 2px; overflow: hidden; }
    .progress-bar { height: 100%; background: var(--accent); border-radius: 2px; width: 0%; transition: width 0.2s ease; }
    .load-status { font-size: 0.72rem; color: #666; }
    .error { display: none; position: absolute; inset: 0; flex-direction: column; align-items: center; justify-content: center; gap: 1rem; text-align: center; padding: 2rem; background: #2a2a2a; z-index: 20; }
    .error.show { display: flex; }
    .error h2 { color: #ddd; font-size: 1rem; font-weight: 500; }
    .error p { color: #777; font-size: 0.82rem; max-width: 340px; line-height: 1.6; }
    .error a { color: #c06060; font-size: 0.82rem; }
    :fullscreen .toolbar, :-webkit-full-screen .toolbar { z-index: 100; }
  </style>
</head>
<body>

<!-- DESKTOP TOOLBAR -->
<div class="toolbar">
  <a class="tb-back" href="index.html">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    All Publications
  </a>
  <span class="tb-title" id="doc-title">Loading…</span>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-first" disabled onclick="goFirst()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="11 17 6 12 11 7"/><polyline points="18 17 13 12 18 7"/></svg></button>
  <button class="tb-btn" id="btn-prev"  disabled onclick="goPrev()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
  <span class="tb-page" id="page-indicator">— / —</span>
  <button class="tb-btn" id="btn-next"  disabled onclick="goNext()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
  <button class="tb-btn" id="btn-last"  disabled onclick="goLast()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="13 17 18 12 13 7"/><polyline points="6 17 11 12 6 7"/></svg></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="btn-zoom"  disabled onclick="toggleZoom()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/><line x1="11" y1="8" x2="11" y2="14"/></svg></button>
  <button class="tb-btn" id="btn-tiles" disabled onclick="toggleTiles()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg></button>
  <button class="tb-btn" id="btn-search" disabled onclick="toggleSearch()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg></button>
  <button class="tb-btn" id="btn-fs"    disabled onclick="toggleFullscreen()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg></button>
  <div class="tb-sep"></div>
  <button class="tb-view-toggle" id="btn-view-toggle" disabled onclick="toggleViewMode()">
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    PDF View
  </button>
  <div class="tb-sep"></div>
  <a class="tb-download" id="dl-btn" href="#" download>
    <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    Download
  </a>
</div>

<!-- MOBILE TOP BAR -->
<div class="mobile-topbar">
  <a class="mob-back" href="index.html"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg> Back</a>
  <span class="mob-title" id="mob-title">Loading…</span>
  <span class="mob-page" id="mob-page">—/—</span>
  <div class="mob-nav">
    <button class="mob-btn" id="mob-prev" disabled onclick="goPrev()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
    <button class="mob-btn" id="mob-next" disabled onclick="goNext()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
  </div>
</div>

<!-- ZOOM POPUP -->
<div class="zoom-popup" id="zoom-popup">
  <button onclick="changeZoom(-0.15)" style="width:28px;">−</button>
  <span class="zoom-label" id="zoom-label">100%</span>
  <button onclick="changeZoom(+0.15)" style="width:28px;">+</button>
  <button onclick="resetZoom()" style="font-size:0.68rem;width:auto;padding:0 7px;">Reset</button>
  <div class="zoom-divider"></div>
  <button class="zoom-fit-btn" id="zoom-fit-w" onclick="fitWidth()">Width</button>
  <button class="zoom-fit-btn" id="zoom-fit-p" onclick="fitPage()">Page</button>
</div>

<!-- TILE OVERLAY -->
<div class="tile-overlay" id="tile-overlay">
  <div class="tile-grid" id="tile-grid"></div>
</div>

<div class="body-wrap">
  <!-- Search sidebar -->
  <div class="search-sidebar" id="search-sidebar">
    <div class="search-inner">
      <div class="search-header">
        <span>Search</span>
        <button class="search-close" onclick="toggleSearch()"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
      </div>
      <div class="search-row">
        <input class="search-input" id="search-input" type="text" placeholder="Page number or keyword…" onkeydown="if(event.key==='Enter')doSearch()"/>
        <button class="search-go" onclick="doSearch()">Go</button>
      </div>
      <div class="search-status" id="search-status">Enter a page number or keyword.</div>
      <div class="search-results" id="search-results"></div>
    </div>
  </div>

  <div class="main-area">
    <div class="stage" id="stage">
      <div class="loading" id="loading">
        <span class="load-title" id="load-title">Preparing document…</span>
        <div class="progress-track"><div class="progress-bar" id="progress-bar"></div></div>
        <span class="load-status" id="load-status">Starting…</span>
      </div>
      <div class="error" id="error">
        <h2>Could not load document</h2>
        <p id="error-msg">Check the file is in the pdfs/ folder and publications.json is correct.</p>
        <a href="index.html">← Back to publications</a>
      </div>
      <div id="flipbook-container"><div id="flipbook"></div></div>
    </div>
    <div class="pdf-view" id="pdf-view">
      <div class="pdf-view-inner" id="pdf-view-inner"></div>
    </div>
  </div>
</div>

<!-- PDF side nav (mobile) -->
<button class="pdf-side-nav left"  id="pdf-nav-prev" onclick="pdfNavPrev()" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg></button>
<button class="pdf-side-nav right" id="pdf-nav-next" onclick="pdfNavNext()" disabled><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg></button>

<!-- MOBILE BOTTOM BAR -->
<div class="mobile-bottombar">
  <button class="mob-action" id="mob-tiles" onclick="toggleTiles()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
    <span>Pages</span>
  </button>
  <button class="mob-action" id="mob-search-btn" onclick="toggleSearch()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <span>Search</span>
  </button>
  <button class="mob-action" id="mob-view-btn" onclick="toggleViewMode()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
    <span id="mob-view-label">PDF View</span>
  </button>
  <button class="mob-action" id="mob-fs-btn" onclick="toggleFullscreen()">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>

  <a class="mob-action" id="mob-dl" href="#" download>
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
    <span>Download</span>
  </a>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://unpkg.com/page-flip@2.0.7/dist/js/page-flip.browser.js"></script>
<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ════════════════════════════════════════════════════════
//  CONFIG
// ════════════════════════════════════════════════════════
const RENDER_SCALE    = 2.5;   // flipbook render quality
const THUMB_SCALE     = 0.28;  // tile thumbnail scale
const PDF_VIEW_SCALE  = 1.8;   // PDF scroll view scale
const PRELOAD_WINDOW  = 2;     // pages to render ahead/behind current

// ════════════════════════════════════════════════════════
//  INIT
// ════════════════════════════════════════════════════════
const params   = new URLSearchParams(window.location.search);
const pdfFile  = params.get('file')  || '';
const pdfTitle = params.get('title') || 'Document';
const isMobile = window.innerWidth <= 700;

// Restore last page from sessionStorage (persists across mode switch, cleared on tab close)
const SESSION_KEY = 'doms_reader_' + btoa(pdfFile).replace(/=/g,'').slice(0,16);
let savedPage = parseInt(sessionStorage.getItem(SESSION_KEY)) || 1;

document.title = pdfTitle + ' — DoMS Publications';
['doc-title','mob-title','load-title'].forEach(id => {
  const el = document.getElementById(id); if (el) el.textContent = pdfTitle;
});
document.getElementById('dl-btn').href     = pdfFile;
document.getElementById('dl-btn').download = pdfFile.split('/').pop();
const mobDl = document.getElementById('mob-dl');
mobDl.href = pdfFile; mobDl.download = pdfFile.split('/').pop();

// ════════════════════════════════════════════════════════
//  STATE
// ════════════════════════════════════════════════════════
let pdfDoc       = null;
let pageFlip     = null;
let totalPages   = 0;
let currentPage  = 1;
let viewMode     = 'flipbook';
let zoomLevel    = 1.0;
let pdfZoom      = 1.0;
let pdfViewBuilt = false;

// Lazy render tracking
let pageUserW = 0, pageUserH = 0;
let dispW = 0, dispH = 0;
const flipCanvases  = [];   // 1-indexed: canvas OR blob URL string (after DOM attach)
const thumbDataUrls = [];   // 1-indexed: small JPEG data URLs for tiles
const pdfPageWraps  = [];   // 1-indexed: {el, items, W, H, rendered} or null

// Convert canvas to compressed blob URL — saves ~60-70% memory vs raw canvas
// The canvas is garbage-collected after this; only the blob URL lives on
function canvasToBlobURL(canvas, quality = 0.82) {
  return new Promise(resolve => {
    canvas.toBlob(blob => {
      resolve(blob ? URL.createObjectURL(blob) : null);
    }, 'image/jpeg', quality);
  });
}

// Unified search+spatial index — built once, reused for all queries AND highlights.
// spatialIndex[i] = { text: string, items: [{str, left, top, width, height}] }
// text  = lowercase joined string for fast includes() search
// items = precomputed px rects in user-space (scale=1), used for flipbook highlight
let spatialIndex = null;
let spatialIndexBuilding = false;

// ════════════════════════════════════════════════════════
//  RENDER HELPERS
// ════════════════════════════════════════════════════════
async function renderPageToCanvas(pageNum, scale) {
  const page = await pdfDoc.getPage(pageNum);
  const vp   = page.getViewport({ scale });
  const c    = document.createElement('canvas');
  c.width    = Math.floor(vp.width);
  c.height   = Math.floor(vp.height);
  const ctx  = c.getContext('2d');
  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = 'high';
  await page.render({ canvasContext: ctx, viewport: vp }).promise;
  return { canvas: c, page, viewport: vp };
}

// ════════════════════════════════════════════════════════
//  SEARCH INDEX — built async after initial load, non-blocking
// ════════════════════════════════════════════════════════
async function buildSpatialIndex() {
  if (spatialIndex || spatialIndexBuilding) return;
  spatialIndexBuilding = true;
  spatialIndex = new Array(totalPages + 1);

  for (let i = 1; i <= totalPages; i++) {
    try {
      const page    = await pdfDoc.getPage(i);
      const vp1     = page.getViewport({ scale: 1 });
      const content = await page.getTextContent();
      const items   = [];
      let   text    = '';

      content.items.forEach(it => {
        if (!it.str) return;
        text += it.str + ' ';
        // Precompute highlight rect in user-space (scale=1) px
        const [a, b, , , e, f] = it.transform;
        const fontSize = Math.sqrt(a * a + b * b);
        if (fontSize < 0.5) return;
        items.push({
          str:    it.str.toLowerCase(),
          // Store in user-space — multiply by rx/ry at highlight time
          e, f, fontSize,
          width: Math.abs(it.width) || fontSize * it.str.length * 0.55,
        });
      });

      spatialIndex[i] = { text: text.toLowerCase(), items };
    } catch(e) {
      spatialIndex[i] = { text: '', items: [] };
    }
    // Yield every 5 pages to keep UI responsive
    if (i % 5 === 0) await new Promise(r => setTimeout(r, 0));
  }

  spatialIndexBuilding = false;
  const st = document.getElementById('search-status');
  if (st && st.textContent.includes('Building')) st.textContent = 'Index ready. Enter a keyword.';
}

// ════════════════════════════════════════════════════════
//  FLIPBOOK — LAZY RENDERING
// ════════════════════════════════════════════════════════
async function loadFlipbook() {
  totalPages = pdfDoc.numPages;
  setProgress(3, 'Calculating layout…');

  const page1 = await pdfDoc.getPage(1);
  const vp1u  = page1.getViewport({ scale: 1 });
  pageUserW = vp1u.width; pageUserH = vp1u.height;

  // Render ONLY first 3 pages upfront to show something fast
  const INITIAL = Math.min(3, totalPages);
  const { canvas: fc } = await renderPageToCanvas(1, RENDER_SCALE);
  const srcW = fc.width, srcH = fc.height;
  const stageH = window.innerHeight - (isMobile ? 52 + 56 : 52) - 20;
  const stageW = window.innerWidth  - 20;
  const dScale = isMobile
    ? Math.min(stageH / srcH, stageW / srcW, 1)
    : Math.min(stageH / srcH, (stageW / 2) / srcW, 1);
  dispW = Math.floor(srcW * dScale);
  dispH = Math.floor(srcH * dScale);

  // Convert first page canvas to blob URL (frees canvas memory)
  flipCanvases[1] = await canvasToBlobURL(fc) || fc;
  const { canvas: t1 } = await renderPageToCanvas(1, THUMB_SCALE);
  thumbDataUrls[1] = t1.toDataURL('image/jpeg', 0.7);

  for (let i = 2; i <= INITIAL; i++) {
    setProgress(Math.round((i / INITIAL) * 60), `Rendering page ${i}…`);
    const { canvas } = await renderPageToCanvas(i, RENDER_SCALE);
    flipCanvases[i]  = await canvasToBlobURL(canvas) || canvas;
    const { canvas: t } = await renderPageToCanvas(i, THUMB_SCALE);
    thumbDataUrls[i] = t.toDataURL('image/jpeg', 0.7);
  }

  setProgress(70, 'Building flipbook…');

  // Build ALL page divs — unrendered ones get a placeholder
  const container = document.getElementById('flipbook-container');
  const flipEl    = document.getElementById('flipbook');
  flipEl.innerHTML = '';
  const containerW = isMobile ? dispW : dispW * 2;
  flipEl.style.cssText    = `width:${containerW}px;height:${dispH}px;`;
  container.style.cssText = `width:${containerW}px;height:${dispH}px;transform-origin:center center;`;

  for (let i = 1; i <= totalPages; i++) {
    const div = document.createElement('div');
    div.className = 'page';
    div.dataset.pageNum = i;
    div.style.cssText = `width:${dispW}px;height:${dispH}px;overflow:hidden;background:#fff;position:relative;`;

    if (flipCanvases[i]) {
      // Already rendered — use blob URL so canvas memory can be freed
      const src = typeof flipCanvases[i] === 'string' ? flipCanvases[i] : null;
      const img = document.createElement('img');
      img.src = src || '';
      img.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;`;
      div.appendChild(img);
    } else {
      // Placeholder — will be swapped in when rendered
      const ph = document.createElement('div');
      ph.className = 'page-placeholder';
      ph.style.cssText = `width:${dispW}px;height:${dispH}px;`;
      div.appendChild(ph);
    }
    flipEl.appendChild(div);
  }

  setProgress(80, 'Initialising flipbook…');
  pageFlip = new St.PageFlip(container, {
    width: dispW, height: dispH, size: 'fixed',
    showCover: true, usePortrait: isMobile,
    mobileScrollSupport: false, flippingTime: 600, maxShadowOpacity: 0.5,
  });
  pageFlip.loadFromHTML(flipEl.querySelectorAll('.page'));
  pageFlip.on('flip', e => {
    currentPage = e.data + 1;
    updateControls();
    persistPage();
    scheduleRenderWindow(currentPage);
  });

  setProgress(90, 'Loading remaining pages…');
  document.getElementById('loading').classList.add('hidden');
  container.style.display = 'block';
  enableControls(); updateControls();

  // Restore last page
  if (savedPage > 1 && savedPage <= totalPages) {
    setTimeout(() => pageFlip.flip(savedPage - 1), 300);
  }

  // Render remaining pages in background (non-blocking)
  renderRemainingInBackground(INITIAL + 1);

  // Build thumbnails + tiles in background
  buildThumbnailsInBackground(INITIAL + 1);

  // Build unified spatial+search index in background (completely non-blocking)
  setTimeout(() => buildSpatialIndex(), 1000);
}

// Render remaining flipbook pages in background — fills in placeholders
async function renderRemainingInBackground(startFrom) {
  for (let i = startFrom; i <= totalPages; i++) {
    if (flipCanvases[i]) continue;
    const { canvas } = await renderPageToCanvas(i, RENDER_SCALE);
    // Convert to blob URL, free canvas from memory
    const blobUrl = await canvasToBlobURL(canvas);
    flipCanvases[i] = blobUrl || canvas; // fallback to canvas if blob fails
    swapPlaceholder(i, typeof flipCanvases[i] === 'string' ? flipCanvases[i] : '');
    await new Promise(r => setTimeout(r, 0));
  }
}

// Swap placeholder div with real canvas for a given page
function swapPlaceholder(pageNum, blobUrl) {
  const pageDiv = document.querySelector(`#flipbook .page[data-page-num="${pageNum}"]`);
  if (!pageDiv) return;
  const ph = pageDiv.querySelector('.page-placeholder');
  if (!ph) return; // already swapped
  const img = document.createElement('img');
  img.src = blobUrl;
  img.style.cssText = `width:${dispW}px;height:${dispH}px;display:block;`;
  pageDiv.replaceChild(img, ph);
}

// Ensure pages around currentPage are rendered (preload window)
async function scheduleRenderWindow(page) {
  const start = Math.max(1, page - PRELOAD_WINDOW);
  const end   = Math.min(totalPages, page + PRELOAD_WINDOW);
  for (let i = start; i <= end; i++) {
    if (!flipCanvases[i]) {
      const { canvas } = await renderPageToCanvas(i, RENDER_SCALE);
      const blobUrl = await canvasToBlobURL(canvas);
      flipCanvases[i] = blobUrl || canvas;
      swapPlaceholder(i, typeof flipCanvases[i] === 'string' ? flipCanvases[i] : '');
    }
  }
}

async function buildThumbnailsInBackground(startFrom) {
  for (let i = startFrom; i <= totalPages; i++) {
    if (thumbDataUrls[i]) continue;
    const { canvas: t } = await renderPageToCanvas(i, THUMB_SCALE);
    thumbDataUrls[i] = t.toDataURL('image/jpeg', 0.7);
    // Update tile if grid is already built
    const tile = document.querySelector(`.tile-item[data-page="${i}"] img`);
    if (tile) tile.src = thumbDataUrls[i];
    await new Promise(r => setTimeout(r, 0));
  }
  // Rebuild tile grid once all thumbnails ready
  buildTileGrid();
}

// ════════════════════════════════════════════════════════
//  CONTROLS
// ════════════════════════════════════════════════════════
function setProgress(pct, msg) {
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('load-status').textContent  = msg;
}
function showError(msg) {
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('error-msg').textContent = msg;
  document.getElementById('error').classList.add('show');
}
function enableControls() {
  ['btn-first','btn-prev','btn-next','btn-last','btn-zoom','btn-tiles','btn-search','btn-fs','btn-view-toggle']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
  ['mob-prev','mob-next','mob-tiles','mob-search-btn','mob-view-btn','mob-fs-btn']
    .forEach(id => { const el = document.getElementById(id); if (el) el.disabled = false; });
}
function updateControls() {
  const txt = `${currentPage} / ${totalPages}`;
  ['page-indicator','mob-page'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = txt; });
  document.getElementById('btn-first').disabled = currentPage <= 1;
  document.getElementById('btn-prev').disabled  = currentPage <= 1;
  document.getElementById('btn-next').disabled  = currentPage >= totalPages;
  document.getElementById('btn-last').disabled  = currentPage >= totalPages;
  ['mob-prev','mob-next'].forEach((id, idx) => {
    const el = document.getElementById(id); if (el) el.disabled = idx === 0 ? currentPage <= 1 : currentPage >= totalPages;
  });
  ['pdf-nav-prev','pdf-nav-next'].forEach((id, idx) => {
    const el = document.getElementById(id); if (el) el.disabled = idx === 0 ? currentPage <= 1 : currentPage >= totalPages;
  });
  document.querySelectorAll('.tile-item').forEach((t,i) =>
    t.classList.toggle('current', i + 1 === currentPage));
}
function persistPage() {
  try { sessionStorage.setItem(SESSION_KEY, currentPage); } catch(e) {}
}

function goFirst() { if (viewMode==='flipbook') pageFlip && pageFlip.flip(0); }
function goLast()  { if (viewMode==='flipbook') pageFlip && pageFlip.flip(totalPages - 1); }
function goPrev()  { if (viewMode==='flipbook') pageFlip && pageFlip.flipPrev(); }
function goNext()  { if (viewMode==='flipbook') pageFlip && pageFlip.flipNext(); }
function pdfNavPrev() { if (currentPage > 1) scrollToPdfPage(currentPage - 1); }
function pdfNavNext() { if (currentPage < totalPages) scrollToPdfPage(currentPage + 1); }

function goToPage(n, query) {
  if (viewMode === 'flipbook') {
    document.getElementById('tile-overlay').classList.remove('open');
    document.getElementById('btn-tiles').classList.remove('active');
    if (pageFlip) {
      if (query) {
        let highlighted = false;
        const onFlip = () => {
          if (highlighted) return;
          highlighted = true;
          pageFlip.off('flip', onFlip);
          setTimeout(() => highlightFlipbook(n, query), 150);
        };
        pageFlip.on('flip', onFlip);
        setTimeout(() => { if (!highlighted) { highlighted = true; highlightFlipbook(n, query); } }, 900);
      }
      pageFlip.flip(n - 1);
    }
  } else {
    scrollToPdfPage(n);
    if (query) setTimeout(() => highlightPdfView(n, query), 200);
  }
}

// ════════════════════════════════════════════════════════
//  ZOOM
// ════════════════════════════════════════════════════════
function toggleZoom() {
  const p = document.getElementById('zoom-popup');
  p.classList.toggle('open');
  document.getElementById('btn-zoom').classList.toggle('active', p.classList.contains('open'));
  updateZoomLabel();
}
function updateZoomLabel() {
  const z = viewMode === 'pdf' ? pdfZoom : zoomLevel;
  document.getElementById('zoom-label').textContent = Math.round(z * 100) + '%';
}
function applyFlipbookZoom() {
  document.getElementById('flipbook-container').style.transform = `scale(${zoomLevel})`;
}
function applyPdfZoom() {
  const inner = document.getElementById('pdf-view-inner');
  inner.style.transform = `scale(${pdfZoom})`;
  inner.style.transformOrigin = 'top center';
  updateZoomLabel();
}
function changeZoom(d) {
  if (viewMode === 'pdf') {
    pdfZoom = Math.max(0.3, Math.min(3, Math.round((pdfZoom + d) * 20) / 20));
    applyPdfZoom();
  } else {
    zoomLevel = Math.max(0.3, Math.min(2.5, Math.round((zoomLevel + d) * 20) / 20));
    applyFlipbookZoom();
  }
  updateZoomLabel();
  document.getElementById('zoom-fit-w').classList.remove('active-fit');
  document.getElementById('zoom-fit-p').classList.remove('active-fit');
}
function resetZoom() {
  if (viewMode === 'pdf') { pdfZoom = 1.0; applyPdfZoom(); }
  else { zoomLevel = 1.0; applyFlipbookZoom(); }
  updateZoomLabel();
  document.getElementById('zoom-fit-w').classList.remove('active-fit');
  document.getElementById('zoom-fit-p').classList.remove('active-fit');
}
function fitWidth() {
  if (viewMode !== 'pdf' || !pdfPageWraps.find(w=>w)) return;
  const wrap  = pdfPageWraps.find(w=>w);
  const outer = document.getElementById('pdf-view').clientWidth - 32;
  pdfZoom = Math.max(0.3, Math.min(3, outer / Math.min(wrap.W, window.innerWidth - 32)));
  applyPdfZoom();
  document.getElementById('zoom-fit-w').classList.add('active-fit');
  document.getElementById('zoom-fit-p').classList.remove('active-fit');
}
function fitPage() {
  if (viewMode !== 'pdf' || !pdfPageWraps.find(w=>w)) return;
  const wrap   = pdfPageWraps.find(w=>w);
  const outer  = document.getElementById('pdf-view');
  const wW     = Math.min(wrap.W, window.innerWidth - 32);
  const wH     = wrap.H * (wW / wrap.W);
  pdfZoom = Math.max(0.2, Math.min(3, Math.min((outer.clientWidth - 32) / wW, (outer.clientHeight - 32) / wH)));
  applyPdfZoom();
  document.getElementById('zoom-fit-p').classList.add('active-fit');
  document.getElementById('zoom-fit-w').classList.remove('active-fit');
}

// ════════════════════════════════════════════════════════
//  FULLSCREEN
// ════════════════════════════════════════════════════════
const FS_ENTER = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 3 21 3 21 9"/><polyline points="9 21 3 21 3 15"/><line x1="21" y1="3" x2="14" y2="10"/><line x1="3" y1="21" x2="10" y2="14"/></svg>`;
const FS_EXIT  = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="4 14 10 14 10 20"/><polyline points="20 10 14 10 14 4"/><line x1="10" y1="14" x2="3" y2="21"/><line x1="21" y1="3" x2="14" y2="10"/></svg>`;
function toggleFullscreen() {
  if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(()=>{});
  else document.exitFullscreen();
}
document.addEventListener('fullscreenchange', () => {
  document.getElementById('btn-fs').innerHTML = document.fullscreenElement ? FS_EXIT : FS_ENTER;
});

// ════════════════════════════════════════════════════════
//  TILES
// ════════════════════════════════════════════════════════
function buildTileGrid() {
  const grid = document.getElementById('tile-grid');
  grid.innerHTML = '';
  for (let i = 1; i <= totalPages; i++) {
    const item = document.createElement('div');
    item.className = 'tile-item' + (i === currentPage ? ' current' : '');
    item.dataset.page = i;
    item.onclick = () => goToPage(i);
    const img = document.createElement('img');
    img.src = thumbDataUrls[i] || 'data:image/gif;base64,R0lGODlhAQABAIAAAMLCwgAAACH5BAAAAAAALAAAAAABAAEAAAICRAEAOw==';
    img.alt = 'Page ' + i;
    const num = document.createElement('div');
    num.className = 'tile-page-num'; num.textContent = 'Page ' + i;
    item.appendChild(img); item.appendChild(num);
    grid.appendChild(item);
  }
}
function toggleTiles() {
  const o = document.getElementById('tile-overlay');
  o.classList.toggle('open');
  document.getElementById('btn-tiles').classList.toggle('active', o.classList.contains('open'));
  document.getElementById('mob-tiles').classList.toggle('active', o.classList.contains('open'));
  if (o.classList.contains('open')) {
    const cur = o.querySelector('.current'); if (cur) cur.scrollIntoView({ block: 'center' });
  }
}

// ════════════════════════════════════════════════════════
//  PDF VIEW — LAZY BUILDING
// ════════════════════════════════════════════════════════
async function toggleViewMode() {
  if (viewMode === 'flipbook') {
    viewMode = 'pdf';
    document.getElementById('stage').style.display = 'none';
    document.getElementById('pdf-view').classList.add('active');

    if (!pdfViewBuilt) {
      document.getElementById('loading').classList.remove('hidden');
      setProgress(0, 'Building PDF view…');
      const inner = document.getElementById('pdf-view-inner');
      inner.innerHTML = '';

      // Build placeholder wraps for ALL pages first (instant)
      for (let i = 1; i <= totalPages; i++) {
        const { el, W, H } = buildPdfPagePlaceholder(i);
        inner.appendChild(el);
        pdfPageWraps[i] = { el, W, H, rendered: false, items: [] };
      }
      pdfViewBuilt = true;
      document.getElementById('loading').classList.add('hidden');

      // Set up IntersectionObserver to lazily render visible pages
      setupPdfLazyObserver();
    }

    document.getElementById('pdf-nav-prev').disabled = currentPage <= 1;
    document.getElementById('pdf-nav-next').disabled = currentPage >= totalPages;
    const lbl = 'Flipbook';
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 014 4v14a3 3 0 00-3-3H2z"/><path d="M22 3h-6a4 4 0 00-4 4v14a3 3 0 013-3h7z"/></svg> ${lbl}`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = lbl;
    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = true);
    updateZoomLabel();
    // Scroll to current page
    setTimeout(() => scrollToPdfPage(currentPage), 100);
  } else {
    viewMode = 'flipbook';
    document.getElementById('pdf-view').classList.remove('active');
    document.getElementById('stage').style.display = '';
    const lbl = 'PDF View';
    document.getElementById('btn-view-toggle').innerHTML =
      `<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/></svg> ${lbl}`;
    const mvl = document.getElementById('mob-view-label'); if (mvl) mvl.textContent = lbl;
    ['btn-first','btn-prev','btn-next','btn-last','btn-tiles'].forEach(id =>
      document.getElementById(id).disabled = false);
    updateControls(); updateZoomLabel();
  }
}

// Build a placeholder wrap for a PDF page (fast, no rendering)
function buildPdfPagePlaceholder(pageNum) {
  // Use user-space dimensions scaled by PDF_VIEW_SCALE for correct aspect ratio
  const W = Math.floor(pageUserW * PDF_VIEW_SCALE);
  const H = Math.floor(pageUserH * PDF_VIEW_SCALE);
  const el = document.createElement('div');
  el.className = 'pdf-page-wrap';
  el.dataset.pageNum = pageNum;
  el.style.width  = W + 'px';
  el.style.height = H + 'px';
  const ph = document.createElement('div');
  ph.className = 'pdf-page-placeholder';
  ph.style.cssText = `width:${W}px;height:${H}px;`;
  el.appendChild(ph);
  return { el, W, H };
}

// IntersectionObserver renders PDF pages only when they scroll into view
let pdfLazyObserver = null;
function setupPdfLazyObserver() {
  if (pdfLazyObserver) pdfLazyObserver.disconnect();
  const pdfViewEl = document.getElementById('pdf-view');
  pdfLazyObserver = new IntersectionObserver(async entries => {
    for (const entry of entries) {
      if (!entry.isIntersecting) continue;
      const n = parseInt(entry.target.dataset.pageNum);
      if (isNaN(n)) continue;

      // Track current page
      if (entry.intersectionRatio >= 0.3 && n !== currentPage) {
        currentPage = n; updateControls(); persistPage();
      }

      // Render this page if not yet done
      if (!pdfPageWraps[n] || pdfPageWraps[n].rendered) continue;
      pdfLazyObserver.unobserve(entry.target); // stop observing once rendering starts
      await renderPdfPage(n);
    }
  }, { root: pdfViewEl, threshold: [0.1, 0.3, 0.5] });

  pdfPageWraps.forEach(pw => { if (pw) pdfLazyObserver.observe(pw.el); });
}

async function renderPdfPage(pageNum) {
  const pw = pdfPageWraps[pageNum];
  if (!pw || pw.rendered) return;
  pw.rendered = true;

  const { canvas, page, viewport } = await renderPageToCanvas(pageNum, PDF_VIEW_SCALE);
  const W = canvas.width, H = canvas.height;
  pw.W = W; pw.H = H;

  // Replace placeholder with canvas
  const ph = pw.el.querySelector('.pdf-page-placeholder');
  pw.el.style.width  = W + 'px';
  pw.el.style.height = H + 'px';
  canvas.style.cssText = 'display:block;width:100%;height:auto;';
  if (ph) pw.el.replaceChild(canvas, ph);
  else pw.el.insertBefore(canvas, pw.el.firstChild);

  // Pre-compute text item rects (for highlight)
  const content = await page.getTextContent();
  pw.items = [];
  content.items.forEach(item => {
    if (!item.str || !item.str.trim()) return;
    const [a, b, , , e, f] = item.transform;
    const fontSize = Math.sqrt(a * a + b * b);
    if (fontSize < 0.5) return;
    const cx = e * PDF_VIEW_SCALE;
    const cy = H - (f * PDF_VIEW_SCALE);
    const cw = Math.abs(item.width) * PDF_VIEW_SCALE;
    const ch = fontSize * PDF_VIEW_SCALE;
    pw.items.push({
      str:    item.str.toLowerCase(),
      left:   (cx / W * 100).toFixed(3),
      top:    ((cy - ch * 1.15) / H * 100).toFixed(3),
      width:  ((cw || ch * item.str.length * 0.6) / W * 100).toFixed(3),
      height: (ch * 1.35 / H * 100).toFixed(3),
    });
  });

  // Link overlays
  try {
    const anns = await page.getAnnotations();
    anns.forEach(ann => {
      if (ann.subtype !== 'Link') return;
      const hasUrl = ann.url && ann.url.trim();
      if (!hasUrl && ann.dest == null && ann.action == null) return;
      const vr = viewport.convertToViewportRectangle(ann.rect);
      const x1 = Math.min(vr[0],vr[2]), y1 = Math.min(vr[1],vr[3]);
      const x2 = Math.max(vr[0],vr[2]), y2 = Math.max(vr[1],vr[3]);
      const a = document.createElement('a');
      a.className = 'pdf-link';
      a.style.left   = ((x1/W)*100).toFixed(3) + '%';
      a.style.top    = ((y1/H)*100).toFixed(3) + '%';
      a.style.width  = (((x2-x1)/W)*100).toFixed(3) + '%';
      a.style.height = (((y2-y1)/H)*100).toFixed(3) + '%';
      if (hasUrl) {
        a.href = ann.url; a.target = '_blank'; a.rel = 'noopener noreferrer'; a.title = ann.url;
      } else {
        a.href = '#';
        const dest = ann.dest || (ann.action && ann.action.dest);
        a.addEventListener('click', async ev => {
          ev.preventDefault();
          if (!dest) return;
          try {
            const arr = typeof dest === 'string' ? await pdfDoc.getDestination(dest) : dest;
            if (arr && arr[0]) scrollToPdfPage((await pdfDoc.getPageIndex(arr[0])) + 1);
          } catch(err) { console.warn('Internal link:', err); }
        });
      }
      pw.el.appendChild(a);
    });
  } catch(e) { /* annotations optional */ }
}

function scrollToPdfPage(n) {
  if (!pdfPageWraps[n]) return;
  pdfPageWraps[n].el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  currentPage = n; updateControls(); persistPage();
}

// ════════════════════════════════════════════════════════
//  SEARCH — uses pre-built index
// ════════════════════════════════════════════════════════
function toggleSearch() {
  const s = document.getElementById('search-sidebar');
  s.classList.toggle('open');
  document.getElementById('btn-search').classList.toggle('active', s.classList.contains('open'));
  document.getElementById('mob-search-btn').classList.toggle('active', s.classList.contains('open'));
  if (s.classList.contains('open')) {
    if (!spatialIndex && !spatialIndexBuilding) {
      document.getElementById('search-status').textContent = 'Building index…';
      buildSpatialIndex();
    }
    setTimeout(() => document.getElementById('search-input').focus(), 210);
  }
}

async function doSearch() {
  const query = document.getElementById('search-input').value.trim();
  if (!query) return;
  const statusEl  = document.getElementById('search-status');
  const resultsEl = document.getElementById('search-results');
  resultsEl.innerHTML = '';

  // Page number jump
  const pageNum = parseInt(query, 10);
  if (!isNaN(pageNum) && String(pageNum) === query && pageNum >= 1 && pageNum <= totalPages) {
    statusEl.textContent = `Jumping to page ${pageNum}`; goToPage(pageNum); return;
  }

  // Wait for index if still building
  if (!spatialIndex) {
    statusEl.textContent = 'Building search index, please wait…';
    await buildSpatialIndex();
  }
  statusEl.textContent = 'Searching…';

  const q = query.toLowerCase();
  const matches = [];
  for (let i = 1; i <= totalPages; i++) {
    const entry = spatialIndex[i];
    if (!entry || !entry.text.includes(q)) continue;
    const idx = entry.text.indexOf(q);
    matches.push({ page: i, snippet: entry.text.substring(Math.max(0, idx - 40), idx + 80) });
  }

  if (!matches.length) { statusEl.textContent = `No results for "${query}"`; return; }
  statusEl.textContent = `${matches.length} page${matches.length > 1 ? 's' : ''} found`;

  const re = new RegExp(query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'), 'gi');
  matches.forEach(m => {
    const item = document.createElement('div');
    item.className = 'sr-item';
    item.onclick = () => {
      document.querySelectorAll('.sr-item').forEach(el => el.classList.remove('active-result'));
      item.classList.add('active-result'); goToPage(m.page, query);
    };
    item.innerHTML = `
      <img class="sr-thumb" src="${thumbDataUrls[m.page]||''}" alt="Page ${m.page}"/>
      <div class="sr-info">
        <div class="sr-page">Page ${m.page}</div>
        <div class="sr-match">…${m.snippet.replace(re, s => `<mark>${s}</mark>`)}…</div>
      </div>`;
    resultsEl.appendChild(item);
  });
}

// ════════════════════════════════════════════════════════
//  HIGHLIGHT
// ════════════════════════════════════════════════════════
function highlightFlipbook(pageNum, query) {
  // Uses spatialIndex — ZERO PDF fetches, instant
  if (!query || !spatialIndex || !spatialIndex[pageNum]) return;
  document.querySelectorAll('#flipbook .hl-box').forEach(el => el.remove());

  const entry = spatialIndex[pageNum];
  const q     = query.toLowerCase();
  const allDivs = [...document.querySelectorAll(`#flipbook .page[data-page-num="${pageNum}"]`)];
  const pageDiv = allDivs.find(d => d.offsetParent !== null) || allDivs[0];
  if (!pageDiv) return;

  const rx = dispW / pageUserW;
  const ry = dispH / pageUserH;
  let count = 0;

  entry.items.forEach(item => {
    if (count >= 20 || !item.str.includes(q)) return;
    const left   = item.e * rx;
    const top    = (pageUserH - item.f - item.fontSize * 1.15) * ry;
    const width  = item.width * rx;
    const height = item.fontSize * ry * 1.35;
    if (left + width < 0 || top + height < 0 || left > dispW || top > dispH) return;
    const box = document.createElement('div');
    box.className = 'hl-box';
    box.style.left   = Math.max(0, left).toFixed(1)   + 'px';
    box.style.top    = Math.max(0, top).toFixed(1)    + 'px';
    box.style.width  = Math.max(4, width).toFixed(1)  + 'px';
    box.style.height = Math.max(6, height).toFixed(1) + 'px';
    pageDiv.appendChild(box);
    count++;
  });
}

function highlightPdfView(pageNum, query) {
  if (!query || !pdfPageWraps[pageNum]) return;
  document.querySelectorAll('.hl-mark').forEach(el => el.remove());
  const q  = query.toLowerCase();
  const pw = pdfPageWraps[pageNum];
  if (!pw.rendered) {
    // Page not rendered yet in PDF view — render it first
    renderPdfPage(pageNum).then(() => highlightPdfView(pageNum, query));
    return;
  }
  let count = 0, firstMark = null;
  pw.items.forEach(item => {
    if (count >= 30 || !item.str.includes(q)) return;
    const mark = document.createElement('div');
    mark.className = 'hl-mark';
    mark.style.left   = item.left   + '%';
    mark.style.top    = item.top    + '%';
    mark.style.width  = item.width  + '%';
    mark.style.height = item.height + '%';
    pw.el.appendChild(mark);
    if (!firstMark) firstMark = mark;
    count++;
  });
  if (firstMark) firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
  setTimeout(() => document.querySelectorAll('.hl-mark').forEach(el => el.remove()), 6000);
}

// ════════════════════════════════════════════════════════
//  KEYBOARD
// ════════════════════════════════════════════════════════
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { viewMode === 'flipbook' ? goNext() : pdfNavNext(); }
  if (e.key === 'ArrowLeft'  || e.key === 'ArrowUp')   { viewMode === 'flipbook' ? goPrev() : pdfNavPrev(); }
  if (e.key === 'f' || e.key === 'F') toggleFullscreen();
  if (e.key === '+' || e.key === '=') changeZoom(0.1);
  if (e.key === '-') changeZoom(-0.1);
  if (e.key === '0') resetZoom();
  if (e.key === 'Escape') {
    document.getElementById('tile-overlay').classList.remove('open');
    document.getElementById('zoom-popup').classList.remove('open');
    if (document.fullscreenElement) document.exitFullscreen();
  }
});
document.addEventListener('click', e => {
  if (!e.target.closest('#zoom-popup') && !e.target.closest('#btn-zoom'))
    document.getElementById('zoom-popup').classList.remove('open');
});

// ════════════════════════════════════════════════════════
//  BOOT
// ════════════════════════════════════════════════════════
async function boot() {
  if (!pdfFile) { showError('No PDF file specified.'); return; }
  try {
    setProgress(2, 'Fetching document…');
    const url = new URL(pdfFile, window.location.href).href;
    pdfDoc = await pdfjsLib.getDocument({
      url, withCredentials: false,
      cMapUrl: 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/cmaps/',
      cMapPacked: true,
    }).promise;
    await loadFlipbook();
    buildTileGrid(); // initial tiles (some may be placeholders, filled in by background job)
  } catch(e) {
    console.error('BOOT ERROR:', e);
    showError(`Could not load "${pdfFile}". Make sure the file exists in the pdfs/ folder.`);
  }
}
boot();
